body:
  text: 下卷四十六脅痛余弟於六月赴邑途行受熱且過勞性多躁暴忽左脅痛皮膚上一片紅如碗大發水泡瘡三五點脈七至而弦夜重於晝醫作肝經鬱火治之以黃連青皮香附川芎柴胡之類進一服其夜痛極且增熱次早看之其皮膚上紅大如盤水泡瘡又加至三十餘粒醫教以白礬研未井水調敷仍於前藥加青黛龍膽草進之其夜痛苦不已叫號之聲徹於四鄰脅中痛如鉤摘之狀次早觀之其紅已及半身矣水泡瘡又增至百數予心甚不懌乃載歸以詢先師黃古潭先生先生觀脈案藥方哂曰切脈認病則審矣製藥訂方則未也夫用藥如用兵知已知彼百戰百勝今病勢有燒眉之急迭卵之危豈可執尋常瀉肝之劑正治耶是謂驅羊搏虎矣且苦寒之藥愈資其燥以故病轉增劇水泡瘡發於外者肝鬱既久不得發越乃侮其所不勝故皮腠為之潰也至於自焚則死矣可懼之甚為訂一方以大栝蔞一枚重一二兩者連皮搗爛加粉草二錢紅花五分戌時進藥少頃就得睡至子丑時方醒問之已不痛矣乃索食予禁止之恐邪火未盡退也急煎藥渣與之又睡至天明時微利一度復睡至辰時起視皮膚之紅皆已冰釋而水泡瘡亦盡斂矣後亦不服他藥夫病重三日飲食不進呻吟不輟口一劑而愈真可謂之神矣夫栝蔞味甘寒經云泄其肝者緩其中且其為物柔而滑潤於郁不逆甘緩潤下又如油之洗物未嘗不潔考之本草栝蔞能治插脅之痛蓋為其緩中潤燥以致於流通故痛自然止也四十七腹中水塊作痛生生子曰一婦三十五歲無子恐夫娶妾致郁經不行者三月矣病腹痛惡心諸醫皆云有孕其夫亦粗知醫舉家欣喜治以安胎行氣止痛之藥服三五十帖不效痛苦益甚凡未申時發寒熱腹中有塊如彈子大者二三十枚翻騰作痛行動則水聲漉漉痛極則吐酸水五六碗吐盡則塊息而寒熱除痛亦不作明日亦然又作瘧治轉劇召予診左手弦尺澀右手濡弱重取則滑尺同左時經已五月不行矣予曰此郁病也豈有澀脈成孕之理若然則前藥當效矣其夫亦悟乃為制方以二陳加香附山梔撫芎玄胡當歸紅花之類藥進而痛止連與四帖皆效但藥止則痛發如故調治一月不能除根予因持脈案見先師黃古潭先生先生乃諭予曰此鬱火病也其病起於肝膽蓋肝主謀慮膽主決斷謀不決則鬱生郁生則木盛木盛則凌脾脾傷則不能運化精微而生氣血以故月水不來也肺金失於母養則降殺之令不行木寡於畏而侮所不勝是以直衝犯清道以作吐也吐後諸症皆減者木升而火息也為裁一方以黃耆五錢柴胡三錢白芍藥二錢甘草一錢陳皮貝母枳實各五分姜三片一劑而寒熱除再劑而痛減吐止水聲亦絕七日不發其夫喜曰是何神速也乃拉予復請命於先生先生曰夫寒熱者少陽膽也吐酸者厥陰肝也痛而復塊翻騰者火盛激動其水如鍋中湯滾泡浪沸騰是也吐多則肺金愈傷故用黃耆補肺金為君使得以制肝木以柴胡瀉肝為臣以升發其膽火經曰木鬱則達之達是通達之義夫木性上升者也既鬱則不升故用柴胡升發膽肝之清氣使衝開其鬱結以復其常又曰過者折之以其畏也所謂瀉之補肺制肝正謂此也又曰泄其肝者緩其中以甘草緩中為佐又曰木位之主其瀉以酸以白芍藥於脾中瀉木為臣病久生郁郁久則生涎以貝母陳皮枳實開鬱逐涎為裨使然後金得其正木得其平土得其安由是病去而愈速前方用山梔黃連之類皆降下之藥火勢正熾豈區區寒涼所能抑哉故經曰輕者正治重則從其性而升之但凡治病要當識得此意先生吾徽黟人也汪石山翁弟子少業儒通五經以疾就醫治病每有超見此略述其二耳且此今人所患者多而治者鮮有若是之明且盡也故揭附於斯以公同志者庶先生之名不泯也四十八治腎消本事方云唐李祠部治消渴者腎虛所致每發則小便甜醫多不知其故方書缺而不言洪範曰稼穡作甘以物理推之淋餳醋酒作脯法須臾即甜足明人之食後滋味皆甜流在膀胱若腰腎氣盛則上蒸炎氣化成精氣下入骨髓其次為脂膏又其次為血肉其餘則為小便故小便色黃血之餘氣也五臟之氣咸潤者則下味也若腰腎既虛冷則不能蒸化穀氣盡下為小便故味甘不變其色清冷則肌膚枯稿也猶如乳母穀氣上泄皆為乳汁味甘消渴病者下泄皆為小便皆精氣不實於內則小便頻數也又肺為五臟華蓋若下有暖氣蒸則氣潤若下冷極則陽不能升故肺干而渴譬如釜中有水以火暖之又以板復之則暖氣上騰故板能潤若無火力則水氣不能上升此板終不得潤火力者腰腎強盛也常須暖補腎氣飲食得火力則潤上而易消亦免乾渴之患故仲景云宜服八味腎氣丸余族兄雙柏五旬後病此時師以滋陰降火之劑投之小便愈多色清而長味益甘則渴益甚屢更醫率認為熱盡用苦寒輕劑如天花粉黃連麥冬石膏知母之類重劑如汞丹之類不惟不效反至遍身如癩精神癯削脈皆細數余後至曰此東垣所云消渴末傳也能食者必發腦疽背瘡不能食者必傳中滿鼓脹今脈細數而膚皆隱疹寧免其無疽瘍乎急宜更藥毋用寒涼壞胃也乃以腎氣丸加桂心五味子鹿角膠益智仁服之半月精神霈長消渴痊除小便不甜膚疹俱脫十年無恙後以不如意事觸之渴疾復作諸醫又以滋陰劑與之遂成腫滿而斃嗚呼痛哉設若守加味腎氣丸未必有是腫滿病也仲景東垣實為祖師千載之下益使人崇信也特附於斯以告同志四十九羅謙甫藥戒客有病痞者積於其中伏而不得下自外至者捍而不得納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘向之捍者柔而不支焦膈通達呼吸開利快然若未始有疾者不數日痞復作投以故藥其快然也亦如初自是不逾月而痞五作五下每下輒愈然客之氣一語而三引體不勞而汗股不步而慄肌革無所耗於前而其中薾然莫知其所來嗟夫心痞非下不可已予從而下之術未爽也薾然獨何如聞楚之南有良醫焉往而問之醫笑曰子無怪是薾然者也凡子之來固為是薾然也坐吾語汝天下之理有甚快於吾心者其末也必有傷求無傷於其中則無望快於吾心夫陰伏而陽蓄氣與血不運而為痞橫乎子之胸者其累大矣擊而去之不須臾而除甚大之累和平之物不能為也必將搏擊震撓而後可夫人之和氣衝然而甚微泊乎其易危擊搏震撓之功成而子之和亦已病矣由是觀之則子之痞凡一快者則子之和亦一傷矣不逾月而快者五子之和平之氣不既索乎故薾然如不終日也且將去子之痞而無害於和也子歸燕居三月而後與之藥可為也客歸三月齋戒而復請之醫曰子之氣少復矣取藥而授之曰服之三月而疾少平又三月而少康終年而可復常且飲藥不得亟進客歸而行其說然其初使人懣然而遲之蓋三投藥而三反之也然日不見其所攻之效久較則月異而時不同終歲而疾平矣客謁醫再拜而謝之坐而問其故醫曰此醫國之說豈特施之於病哉子獨不見秦之治民乎捍而不聽令惰而不勤事故而不畏法令之不聽治之不變則秦之民常痞矣商君見其痞也厲以刑法威以斬伐悍厲猛鷙不毫髮少貸痛鏟而力敬鳥之於是乎秦之政如建瓴流通四達無敢或拒而秦之痞嘗一快矣自孝公以至二世凡幾痞而幾快矣頑者已圮強者已柔而秦之民無歡心矣故猛政一快者歡心一亡積快而不已而秦之四肢枵然徒具其物而已民心日離而君孤立於上故匹夫大呼不終日而百姓皆起秦欲運其手足肩膂而漠然不我應故秦之亡也是好為快者之過也昔者先王之民其初亦嘗痞矣先王豈不知砉然擊去之以為速也惟懼其有傷於中也故不敢求快於吾心優柔而撫育之教以仁義道以禮樂陰解其亂而除去其痞旁視而懣然有之矣然月計之歲察之前歲之俗非今歲之俗也不擊不搏無所忤逆是以日去其戾氣而不嬰其歡心於是政成教達安樂久而後患除矣是故三代之治皆更數聖人歷數百年而後俗成則予之藥終年而疾愈蓋無足怪也故曰天下之理有甚快於吾心者其末也必有傷求無傷於其中則無望快於予心雖然豈特治天下為然哉客再拜而紀其說五十人經脈上下左右前後二十八脈考靈樞經第十五篇有曰人經脈上下左右前後二十八脈以應二十八宿夫謂二十八脈者何左右手足上下各十二經又陰蹺陽蹺共二十六也合任督二脈前後以足其數云五十一人身有四海說生生子曰天有四時地有四海而人亦應之四海者髓海血海氣海水穀之海也十二經水皆注於海也岐伯曰胃者水穀之海其輸上在氣街下至三里衝脈者為十二經之海其輸上在於大杼下出於巨虛之上下廉膻中者為氣之海其輸上在於柱骨之上下前在於人迎腦為髓之海其輸上在於其蓋下在風府有餘不足皆可得而見也氣海有餘者氣滿胸中悗息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水穀之海有餘則腹滿不足則飢不受穀食髓海有餘則輕勁多力自過其度不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥凡此有餘不足宜審守其輸而調其虛實無犯其虛順者得復逆者必敗出靈樞海論篇五十二刪定野山秘抄種子論易曰天地絪縕萬物化醇男女媾精萬物化生則絪縕者升降凝聚之謂也媾精者配合交感之謂也必二氣合則化自生矣否則獨陽不生獨陰不成惡能望其化生哉然則人之不孕育者豈夫婦竟無一交媾之遇邪遇而不識不會是亦獨陰獨陽之謂也不知者諉於天命則泥矣間有倡為資藥餌以養精血候月水以種孕育又多峻補以求詭遇則嗣未必得而害已隨之此固予之痛惜也久矣因究種子之道有四一曰擇地二曰養種三曰乘時四曰投虛是也何也蓋地則母之精也種則父精也時則兩精交媾之時也虛則去舊生新之初也又嘗聞之師曰不受胎之原有二陰失其道而不能受者以氣勝血衰故也衰則寒熱乘之氣凝血滯而營衛不和經水先後多寡不一也陽失其道而不能施者以氣虛精弱故也弱則原於色欲過度耗其精元精元既弱譬之射者力微矢枉安能中的究斯二者皆由不能自寶以致真元耗散陽不施陰不受陰涸陽枯則生生之道息矣猶乃歸之天命不亦誤哉以是種子者必地盛則種可投又必時與虛俱得焉可成孕而生子矣雖然至難養者精至難遇者時與虛苟不憑以藥餌之力示以調攝之宜候以如期之法則養與遇竟茫然矣又知種子之法以調經養精為首而用藥須審平和夫婦尤必相保守旬日之間可使精元俱盛待時而合時則所謂三十時中兩日半也經候至此積穢盪滌既盡新血初生時與虛俱會而可以施其巧矣又恐情竇不開陰陽背弛續有奇砭以動其欲庶子宮開而真元媾合兩情暢美雖平生不孕者亦孕矣尚何疑哉是乃歷試歷驗百發百中者也嗚呼是說也豈畔道云乎哉亦以培植元氣順養天真特資藥力以佐助之所謂人定亦可以勝天者是也由是而知始而無嗣者非天也人自戕天也繼而有嗣者亦非天也人能成其天也故曰斯道順則成人逆則成丹慎毋以天命自諉也噫以天命自諉者良可惜哉五十三護胎說凡婦人孕後當戒之在色不知自慎則欲動而子宮復開豈惟多致半產漏下即生子亦多瘡毒夭傷何也由淫火爍胎也彼馬牛之類受胎後牡逼身輒蹄之使不得近謂之護胎何致有半產之事人惟多欲故往往不知護也產寶論及婦人科俱缺此一款余故採菽園雜記所載者潤色之如此五十四王節齋本草集要參耆論或有問於生生子曰觀子視病用藥嘗於各家所長中求之亦未嘗見於純用參耆何獨於此辯辯不絕口耶予曰予之辯辯蓋欲白王公之冤而針時師之癖也王公以六經出身行軒岐之道著書立言生生之志廓然矣觀其書羽翼丹溪固欲成人之美者蓋丹溪掃溫補之弊其書雖行後之人顛倒於其間者猶未斬然而截跡也故王公娓娓告戒常恐後之人不遵丹溪陰虛之說而闖溫補之藩豈意後人不究其原而於告戒之處則一概木偶而泥塑凡遇發熱咳嗽見紅之疾不察病因不詢兼症則曰此正王公陰虛火動忌用參耆之病也當以滋陰降火治之冤哉冤哉王公欲成人之美者詎謂釀禍迄今不已耶何者時師誦王公之書於雜著則曰是拳拳於滋陰也誦本草於參耆則曰是溫也積溫可以成熱此陽也陽旺則陰愈消肺寒則可服肺熱反傷肺等語時不徹口間欲有用之者則眾起而排之乃曰參耆豈易服者耶服則殺人是以病家亦相安於滋陰雖死而無悔也識卓理融者每為之束手正如一傅眾咻欲求不寒心也難矣推王公之心抑何嘗謂參耆不補陰而特補陽哉觀其序本草集要云古人因病以立方非制方以待病學醫之道莫先於讀本草藥性明然後學處方云云時師觀書只識吹毛求疵安知通章大義又安知寓意之處如古人諷諫之謂也王公本草集要於人參條下云味甘氣溫微寒云云夫既主補五臟安精神定魂魄止驚悸除邪氣明目開心益志調中生津通血脈治五勞七傷以上症誰謂非五臟之陰虛者耶王公曷為不刪而略之王公蓋以其味甘氣雖溫而又有微寒在焉故集此為補陰者之法眼也雖有肺受火邪喘嗽及陰虛火動勞嗽吐血勿用之語蓋指不當補而補之者觀其復引仲景治亡血脈虛以此補之謂氣虛血弱故補其氣而血自生陰生於陽甘能生血也以通章大義觀之王公何嘗道人參不補陰也丹溪治陰虛咳嗽瓊玉膏葛可久治吐血獨參湯義皆孚此於黃耆條下云味甘氣微溫云云夫既補丈夫虛損五勞羸瘦補中生血補肺氣實皮毛瀉陰火為退熱之聖藥治虛勞自汗無汗則發有汗則止又治消渴腹痛泄痢腸風血崩帶下月候不勻產前後一切痛補腎三焦命門元氣藥中呼為羊肉以上症誰謂非五臟之陰虛者耶王公曷為不刪而略之王公亦以其甘能生血且其氣微溫是以能溫分肉而實皮毛以通章大義觀之王公何嘗道黃耆不補陰也東垣治血虛發熱以黃耆一兩當歸二錢名曰補血湯治盜汗用當歸六黃湯以黃耆為君義皆本此夫本草之所以集者特述其藥性之剛柔氣味之溫涼補瀉之專功以為立方治病之准誰謂通章之義不足憑而於一句積溫成熱之說獨可據哉必如時師所言養血藥中以四物湯為主加黃柏知母就為滋陰降火之妙劑則愜然服之而無疑抑不思當歸味甘辛氣溫川芎味辛氣溫當歸雖補血亦能破血以其甘中有辛也川芎上行頂巔下行血海乃血中之氣藥也治一切氣溫中散寒開鬱行氣燥濕又曰久服則走散真氣蓋辛散故也較之於參耆補性優劣為何如俱一本草語也俱王公所集要也時師既宗王公乃不畏芎歸之辛而獨畏參耆之甘抑何僻也丹溪心法傳中羅成之云先生猶以芎歸之性辛溫而非陰虛者所宜服況其他乎時師既遵王公當求王公之所自知王公之所自則可以知丹溪之用心矣予故曰丹溪謂陰虛者救時之言也王公道陰虛者成人之美者也時師言陰虛者偏而僻者也畏人參如虎者此又丹溪王公之罪人誤天下之蒼生者也予之便言豈好辨哉願為王公之忠臣耳五十五洗冤錄載沿身骨節上下聯絡名目夫人兩手指甲連者小節小節之後中節中節之後本節本節之後肢骨之前生掌骨掌骨上生掌肉掌肉後可屈曲者腕腕左起高骨者手外踝右起高骨者右手踝二踝相連生者臂骨輔臂骨者髀骨三骨相繼者肘骨前可屈曲者曲肘曲肘上生者臑骨臑骨上生者肩髃肩髃之前者橫髃骨橫髃骨之前髀骨髀骨之中陷者缺盆缺盆之上者頸頸之前者顙喉顙喉之上者結喉結喉之上者頦頦兩傍者曲頷曲頷兩傍者頤頤兩傍者頰車頰車之上者耳耳上者曲鬢曲鬢上行者頂頂前者囟門囟門之下者髮際髮際正下者額額下者眉眉際之末者太陽穴太陽穴前者目目兩傍者兩小眥小眥上者上瞼下者下瞼正位能瞻視者目瞳子瞳近鼻者兩大眥近兩大眥者山根山根上印堂印堂上者腦角腦角下者承枕骨脊骨下橫生者髖骨髖骨兩傍者釵骨釵骨下中者腰門骨釵骨上連生者腿骨腿骨下可屈曲者曲䐐曲䐐上生者膝蓋骨蓋骨下生者脛骨脛骨傍生䯒骨䯒骨下左起高大者兩足外踝右起高大者兩足內踝脛骨前垂者兩足跂骨跂骨前者足本節本節前者小節小節相連者足趾甲趾甲後生者足前趺趺後凹陷足心下生者足掌骨掌骨後生者踵肉踵肉後者腳跟也五十六洗冤錄驗胎法又五臟論有稱耆婆者云一月如珠露二月如桃花三月男女分四月形象全五月筋骨成六月毛髮生七月動右手於母腹左八月動左手於母腹右九月三轉身十月滿足生若驗得未成形象只念所墮胎作血肉一片或一塊若經日壞爛多化為水若所墮胎已成形象者謂頭腦口眼耳鼻手腳指甲等全亦有臍帶之類若胎在母腹中被驚而死其胎下系紫黑色血蔭軟弱若生下腹外死者其屍系淡紅赤色胞衣白卻無紫黑色極易驗也五十七人身內景說咽之與喉有二竅前後不同喉在前咽在後咽則因物而咽以應地氣而為胃之系下連胃管為水穀之道路自咽而入於胃胃主腐熟水穀其水穀精悍之氣自胃之上口出於賁門輸於脾脾氣散精上歸於心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精氣行於腑腑精神明留於四臟沖和百脈頤養神氣利關節通九竅滋志意者也其滓穢則自胃之下口入於幽門傳於小腸自小腸下口至於大腸上口大小二腸相會為闌門闌門者闌約水穀以分別也其水則滲灌入於膀胱膀胱者胞之室也胞虛受水而為藏水之室家也其濁穢入於大腸大腸一名迴腸以其回屈而受小腸之濁穢也喉主出納以應天氣而為肺之系下接肺經為喘息之道路自喉嚨而通於肺肺下無竅而有空行列分布諸藏清濁之氣以為氣管大腸為肺之府肺色白故大腸為白腸主傳送濁穢之氣下行而不使上干於心肺所謂傳瀉行道之府也肺之下有心心系有二一則上與肺相通一則自肺葉曲折向後並脊膂細絡相連貫脊通髓而與腎系相通小腸為心之腑心色赤故小腸為赤腸主引心火濁氣下行而不使上干於華蓋所謂容受之府也蓋心通五臟系而為五臟之主有膈膜遮蔽濁氣不得上熏於心所以真心不受邪凌犯其所以致病者心包絡耳心包絡是心上漫脂之外有細筋如絲與心肺相連者是也心包絡經自膻中散布絡繞於三焦三焦其氣通灌十二經絡上下往來無有休息自與心包絡配合為表裡故俱有名而無合應脾系在膈下著右脅上與胃膜相連胃為脾之府脾色黃故胃為黃腸而為水穀之府也肝系在心肺下著左脅上貫膈入肺中與膈膜相連而膽在肝短葉之間膽為肝之府肝色青故膽為青腸而為清淨之府也腎與臍對形如石卵而曲附脊膂有繫上通於心所謂坎離相感水火升降者此也膀胱為腎之府腎色黑故膀胱為黑腸而為津液之府也五十八不執方說余屈首受醫日惟有事於素難病源病機甲乙等書俯而誦仰而思希心融貫前哲秘旨而未逮也若彼局方袖珍惠濟等集間用之參考而不敢執泥至臨症務虛心察受病之因始敢投劑亦未嘗執方以合病以故執方之夫往往見而駭之議之謂如上方書之傳簡易捷徑大有便於後學素難諸書固雲精妙乃渙漫艱深力難究竟鬍子好難惡易性與人殊且子診病用藥類與方書懸異有病同而劑異有終始用一法而不殊有三五變其方而不執輒亦投劑獲效此遵何道哉或方書不足憑而他有秘授歟奚與諸醫殊致也余曰嘻醫何容易談哉人之死生關於呼吸間余何敢師心自用而巇嶮為也古稱用藥如用兵然齊步伐肅部伍坐作進退刺殺攻擊一定而不亂者法也胡可廢也乃若知己知彼置伏設奇臨變不測其運用妙於一心藥之君臣佐使味之甘苦寒涼方之丸散湯引著於載籍者法也察病之寒熱虛實感之臟腑表裡所以君臣佐使甘苦寒涼補瀉而丸散湯引者不廢方亦可不執方也故按圖用兵而不達變者以卒與敵執方治病而不察因者未有能生人者也雖然不執方而又合法亦匪易臻也脫非生平融通素難本草仲景潔古守真東垣丹溪諸書不可以語此秘密醫何容易談也子徒以方書為捷徑蓋亦未求之上古乎上古之世無方扁鵲傳載長桑君以禁方相授受亦不載曰何方春秋時秦緩醫和漢淳于公輩以醫名天下亦未嘗有方傳也至張仲景乃始有方是知東漢以前醫皆妙悟心法察病投劑未嘗徇方也彼豈私其方不欲授之人哉誠懼後之人拘執不變必致誤人爾然立法處方不過酌病機之詳確審經絡之虛實察藥性之宜悖明氣味之走守合色脈衍天和調燮陰陽參相造化以一理貫之理融則識真識真則機順自然應變不膠方自吾心出病可去而功可成以成功而名方誰曰不可余何能余僅守方而不執焉己子寧以余言為迂乎五十九列張劉李朱滑六名師小傳孫氏生生子曰醫以通變稱良而執方則泥故業醫者能因古人之法而審其用法之時斯得古人立法之心矣不則窺其一斑而議其偏長即醫如張仲景李東垣諸公亦妄加譏貶也可乎哉可乎哉余故列其因時立法者於後醫學自漢秦以上無方有方自張長沙始故醫家以長沙為方書之祖晚世議長沙者率謂其長於傷寒而短於雜證余惟醫如長沙亦無間然矣乃長沙急於傷寒者蓋病莫大於傷寒而變證亦莫甚於傷寒其生死決於七日十三四日之間非若他疾可從容而治也長沙察其緩急故以傷寒為首務爾不然金匱要略治雜證書也獨非長沙著述者乎何顒別傳有曰仲景受業於同郡張伯祖善於治療尤精經方時人謂扁鵲倉公無以加焉觀此則仲景不專長於傷寒又可知矣而劉宗厚亦曰吾嘗用東垣之藥效仲景處方宗厚丹溪高弟也不效丹溪而效仲景以仲景醫之亞聖非丹溪可企及者效仲景或亦取法乎上之意云後世慎毋輕議長沙也張戴人醫亦奇傑也世人不究其用意議其治疾惟事攻擊即明理如丹溪格致餘論亦譏其偏丹溪之說出益令人畏汗吐下三法如虎並其書置之不與睫交予甚冤之予惟人之受病如寇入國不先逐寇而先拊循適足以養寇而擾黎元也戴人有見於是故以攻疾為急疾去而後調養是得靖寇安民之法矣彼仲景麻黃瓜蒂大承氣非攻擊急劑哉審緩急而用之此仲景意也蓋醫難於認病而不難於攻擊調補戴人特揭其難者言之也丹溪引內經邪之所湊其氣必虛為論乃遺下文留而不去其病為實一句引精氣奪則虛又遺邪氣盛則實一句引虛者正氣虛也又遺實者邪氣實也一句摭其可議戴人為言而於戴所急者略而不採丹溪且若此余又何怪哉且戴人名其書曰儒門事親豈有儒者事親而行霸道以害其親者哉必不然矣譬彼武王伐殷先懸紂於太白而後散財發粟漢高入秦降子嬰而後約法三章彼拘拘然進調補而詘攻擊是猶治國專用賞而不用罰也則舜討凶而尼父誅卯為多事哉予因著於篇以為戴人辯白有謂劉守真長於治火斯言亦未知守真所長也守真高邁明敏非泛常可儔其所治多在推陳致新不使少有怫鬱正造化新新不停之意醫而不知此是無術也此王海藏之言海藏乃東垣高弟尚推轂如此則其邃學可知且其所撰原病式歷揭素問病機一十九條而屬火者五又覘人心好動諸動屬火夫五行具於人身者各一惟火有君有相由此病機屬火者多也原病式特為病機而發故不暇論及其餘若所著保命集三卷治雜證則皆妙絕矣然則謂守真長於治火者其真未知守真所長者乎醫家雅議李東垣善於內傷而虛怯非其所長故有補腎不若補脾之語竊謂腎主闔闢腎間原氣人之司命豈反輕於脾胃哉蓋病有緩急而時勢有不同東垣或以急者為首務也彼當金元擾攘之際人生斯世疲於奔命未免勞倦傷脾憂思傷脾飢飽傷脾何莫而非傷脾也者內經曰脾胃者倉廩之本營之居也又曰五臟六腑皆稟受於脾胃脾胃一傷則臟腑無所受氣故東垣惟孜孜以保脾胃為急彼虛怯傷腎陰者乃燕居安閒淫勝之疾又不可同日而語也不則內外傷辯惑與外科精義及蘭室秘藏等書皆治雜證者豈止內傷已哉此可以觀矣余觀近世醫家明理學者宜莫如丹溪雖倡陽有餘陰不足之論其用意固有所在也蓋以人當承平酗酒縱欲以竭其精精竭則火熾復以剛劑認為溫補故不旋踵血溢內熱骨立而斃與燈膏竭而復加炷者何異此陽有餘陰不足之論所由著也後學不察概守其說一遇虛怯開手便以滋陰降火為劑及末期卒聲啞泄瀉以死則曰丹溪之論具在不知此不善學丹溪之罪而於丹溪何尤丹溪為許文懿高弟學原考亭其認病最真而投劑最確觀其治許文懿之病及疼風十三症可概見矣功首罪魁之言余嘗為冤之昔荀卿喜為高論而李斯祖之以禍天下則報仇行劫之說著矣大都前哲立論必有定見調施經權必合宜適彼執方而不達變者反為丹溪累也余故不惜牙頰辯之余讀史記至太史公所稱由光及伯夷之語未嘗不掩卷嘆滑伯仁之術而後無有彰之者伯仁我明奇士也技藝之精不下丹溪即其文辭如素問抄難經注診有樞要針有經絡發揮與瘡瘍痔瘻醫韻等篇亦可謂集往哲之大成矣顧後學但知宗丹溪心法如靈素與伯仁諸集若罔聞知雖其術有奇中治有明徵所至成名如朱太史列傳所稱亦莫之顧何哉蓋丹溪為當時縉紳所遊揚又戴元禮劉宗厚諸名士為弟子故丹溪之名籍籍而伯仁藝雖高弗若之矣何一陽有言歷考上古高賢若以岐伯越人為醫中尼父則仲景可為顏曾之陪而河間東垣當在宰我子貢之列若伯仁義理精明製作醇粹可與遊夏之班至彥修又下一等也此論甚確而今宗伯仁者不然也豈惟伯仁則戴人守真亦若是爾故太史公曰巖穴之士欲砥立名行非附青雲之仕惡能聲施後世哉此言信矣余故特為伯仁表之也生生子曰余著論若是非阿所好也欲後人知仲景不徒以傷寒擅長守真不獨以治火要譽戴人不當以攻擊蒙譏東垣不專以內傷樹績陽有餘陰不足之譚不可以疵丹溪而攖寧生之長技亦將與諸公並稱不朽矣同志幸亮之毋余訾哉六十醫通節文生生子曰余嘗稱宋儒謂為人子不可不知醫為知言已觀韓氏醫通益證斯言為匪欺也韓飛霞為親習醫而餘澤遍物閱其集方楷當而修制合宜其投劑多奇中有以哉余懼其術沒沒也用採其論藥數款附於集令後人識有韓飛霞雲醫通緒論章飛霞子曰天地萬物氣成形也不位不育病之時也人之養氣踐形而致中和者醫之道也夫醫而至於針砭藥餌第二義矣易無妄九五曰無妄之疾勿藥有喜孔子曰無妄之藥不可試也此最上義也得醫之最上義者氣之沖神之化皆此身之真息以踵也盧扁指豎子華佗剖腸腑白玉蟾呵臀癰藥餌云乎哉針砭云乎哉風土異宜自然氣隔古分南北二政自今輿圖以河界南北而江之東關之西可類從矣南北云者陰陽之軌四方之轂八風之輻輳也人之稟賦三天兩地一氣流行而已氣失其平之謂疾疾甚之謂病三才相因之謂機機動之謂時陰符經曰天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反復又曰食其時百骸理動其機萬化安又曰三才既宜三盜既安嗚呼此可以契醫之三昧矣乎醫之理可比周易針砭藥餌即卜筮法也丹溪云冷生氣高陽生之謬言予謂冷生氣是復卦熱生風是姤卦即天根月窟之化機內經所謂亢則害承乃制者也故王安道論曰易也者造化之不可常者也惟其不可常故神化莫能測易曰一陰一陽之謂道陰陽不測之謂神世之攻醫卜而自小焉者何也藥性裁成藥有成性必材相制味相洽而後達夫病情古書如本草括湯液珍珠諸篇予不能悉記也而二五之升沉鹹苦酸辛甘者觸物在焉姑列數則以例其餘論用藥標病攻擊宜生料者以氣全力強本病服餌宜制煉調劑大成病在元氣宜醇淡論人參人參煉膏回元氣於無何有之鄉王道也黑附子回陽霸功赫奕甘草調元無可無不可論當歸當歸主血分之病川產力剛可攻秦產柔宜補凡用本病酒製而痰獨以薑汁浸透導血歸源之理熟地黃亦然血虛以人參石脂為佐血熱以生地黃薑黃條芩佐之不絕生化之源血積配以大黃婦人形肥血化為痰二味姜浸佐以利水道藥要之血藥不容舍當歸故古方四物湯以為君芍藥為臣地黃分生熟為佐川芎為使可謂典要云論香附香附主氣分之病香能竄苦能降推陳致新故諸書皆云益氣而俗有耗氣之訛女科之專非也治本病略炒兼血以酒煮痰以薑汁虛以童便浸實以鹽水煮積以醋浸水煮婦人血用事氣行則無疾老人精枯血閉惟氣是資小兒氣日充形乃日固大凡病則氣滯而餒故香附於氣分為君藥世所罕知佐以木香散滯泄肺以沉香無不升降以小茴香可行經絡而鹽炒則補腎間元氣香附為君參耆為臣甘草為佐治虛怯甚速佐以厚朴之類決壅積佐以稜莪之類攻壅積之甚者予嘗避諸香燥之熱而用檀香佐香附者以檀香流動諸氣極妙也論半夏痰分之病半夏為主脾主濕每惡濕濕生痰而寒又生濕故半夏之辛燥濕也然必造而為曲以生薑自然汁生白礬湯等分共和造麴楮葉包裹風乾然後入藥風痰以豬牙皂角煮汁去渣滓煉膏如餳入薑汁火痰黑色老痰如膠以竹瀝或荊瀝入薑汁濕痰白色寒痰清以老薑煎濃湯加煅白礬三分之一如半夏三兩煅白礬一兩俱造麴如前法予又以霞天膏加白芥子三分之二薑汁礬湯竹瀝造麴治痰積沉痼者自然使腐敗隨大小便出或散而為瘡此半夏曲之妙也古方二陳湯以此為君世醫因辛反減至少許而茯苓滲濕陳皮行氣甘草醒脾皆臣佐使而反多其銖兩蓋不造麴之過觀法制半夏以薑礬制辛即能大嚼是也佐以南星治風痰以薑汁酒浸炒芩連及栝蔞實香油拌曲略炒之類治痰火以曲炒枳殼枳實薑汁浸蒸大黃海粉之類治老痰以蒼朮白朮俱米泔薑汁浸炒甚至乾薑烏頭皆治濕痰而常有脾泄者以肉豆蔻配半夏曲加神麯麥芽作丸尤有奇效厚養之人酒後多此而苦痰為病者十常八九也方書謂天下無逆流之水人身有倒上之痰氣亂血餘化而為痰故治痰以行氣殺血為要論黃連火分之病黃連為主五臟皆有火平則治病則亂方書有君火相火邪火龍火之論其實一氣而已故丹溪云氣有餘便是火分為數類凡治本病略炒以從邪實火以朴硝湯假火以酒虛火以醋痰火以薑汁俱浸透炒氣滯火以茱萸食積泄以黃土血癖癥瘕痛以乾漆俱以水拌同炒去萸土漆下焦伏火以鹽水浸透焙目疾以人乳浸蒸或點或服生用為君佐官桂少許煎百沸入蜜空心服能使心腎交於頃刻入五苓滑石大治夢遺以土薑酒蜜四炒者為君使君子為臣白芍藥酒煮為佐廣木香為使治小兒五疳以茱萸炒者加木香等分生大黃倍之水丸治五痢以薑汁酒煮者為末和霞天膏治癲癇諸風眩暈瘡瘍皆神效非彼但云瀉心火而與芩柏諸苦藥例稱者比也論諸藥余治沉疴先循經絡者即諸古書所載引經報使藥貴識真爾如心經以人參益氣石脂補血硃砂鉦心天竺黃去痰澤瀉瀉熱而蓮肉茯神赤茯苓遠志益智酸棗之屬利心竅以安神識中間制煉如以苦焦之味達本經咸引所畏辛避所勝酸益其母而甘泄其子皆裁成藥性之道論五穀粳米造飯用荷葉煮湯者寬中芥菜葉者豁痰紫蘇葉者行氣解肌薄荷葉者清熱淡竹葉者闢暑造粥則白粥之外入茯苓酪者清上實下薯蕷粉者理胃花椒汁者闢嵐瘴薑蔥豉汁者發汗與夫古方羊腎豬腎之類無非藥力也一人淋素不服藥余教以專啖粟米粥絕他味旬余減月餘痊此五穀治病之理論五果梨汁疏風豁痰蒸露治內熱藕汁研墨止吐血鼻衄研桃仁調酒破血積胡桃仁佐破故紙鹽水糊丸治腰濕痛如神大棗煮汁去渣煉膏救小兒脾虛胃寒不能藥者蓮肉作末蘇噤口痢柿蒂加㾓頭糠止轉食凡此余以應驕習之家亦五果治疾之理論五菜韭白愈淋予澀精大蔥汁和五倍子末澀虛脫之痢非虛脫不用莧煮汁愈初痢蘿蔔風乾愈傷食嗽白扁豆益脾清暑蒜汁煮香附加蓽茇大黃治瘴鄉中毒諸菜俱能治病貴專啖耳論五畜禽蟲之屬黃牛肉補氣與棉黃耆同功羊肉補血與熟地黃同功豬肉無補而人習之化也惟膽於肝肚於胃腰子於腎脊髓於骨心於血可引諸藥入本經實非其補鹿則全體大補異時每欲以肉汁煉膏如霞天膏小刀圭之法恨不多得牛肝連膽用朴硝作脯消痞塊骨髓煎油擦四肢之損禽則鵝善疏風稚雞補損老雞作羹起衰蟲則蜣螂土裹燒熟與兒食治疳蚋皮作丸大治驚癇疳痢以上予治厚養之人多用之亦從其化也獨犬之壯陽俗夫所尚古方戊戌酒蓋為虛寒病設耳或云士無故不殺犬豕則古人已饈於珍矣意者黑黃二色足補脾腎亦可如小刀圭法為之以治虛怯勞瘵而戒恣欲之非價廉工省可濟貧乏云論異類有情丸人至中年覺體衰弱便可以此丸服餌此方藥僅三品而補性極峻蓋鹿乃陽獸食山中之靈草故多壽夏至一陰生而角便解角得純陽之氣故補人身之陽龜者靈物也屬陰能養息上可補心下可補腎故補人身之陰虎西方之獸也屬金而能抑木故虎嘯而風生也三者皆多壽皆有生育皆有靈性殊非草木金石比也服餌寧無補益乎鹿茸鹿角霜龜板虎脛骨各如常制為末以豬脊髓加煉蜜為丸梧桐子大空心鹽湯吞五七十丸或加豬膽汁一二合和於劑中以寓降火之意六十一難經本義十八難圖注辯十八難秦越人曰手太陰陽明金也足少陰太陽水也金生水水流下行而不能上故在下部足厥陰少陽木也生手太陽少陰火火炎上行而不能下故為上部手心主少陽火生足太陰陽明土土主中宮故在中部也滑伯仁注曰手太陰陽明金下生足太陽少陰水水性下流故居下部足少陰太陽水生足厥陰少陽木木生手少陰太陽火及手心主火火炎上行是為上部火生足太陰陽明土土居中部復生肺金此五行子母更相生養者也觀十八難所列之圖乃以手厥陰心主火與手少陽三焦火分診在下部右尺圖與注自相背戾後人翕然宗之不復查考且經文只雲手之太陰陽明足之太陽少陰為上下部言肺高而腎下子母相望之意按脈經以心肺合於上焦脾胃肝膽合於中焦腎膀胱合於下焦兩尺分診兩腎無手厥陰少陽之語千金方診法與脈經同顧靈蘭秘典篇曰膻中者臣使之官喜樂出焉啟玄子注曰膻中在胸中兩乳間為心君播宣教令氣布陰陽氣和志適則喜樂由生脈要精微論以左寸之外候心內以候膻中膻中為十二臟之一以其無形與心肺並居胸中故診附焉本義此圖恐未必是伯仁之意豈有自相矛盾哉此必後人泥脈訣右肺大腸脾胃命之說而以此圖牽合因土居中部乃以火居下部生中土也獨不思手太陽少陰之火復何所生耶智者自能辯之按何一陽醫學統宗有云圖注難經乃四明張世賢襲取紀天錫袁坤厚虞庶舊章斷簡殘文淺附已意欺為新撰維揚運司梓行失旨處頗多然則難經本義之圖注實張世賢之集者後人增附梓焉非滑氏之筆明矣六十二難經肺金肝木浮沉說三十三難曰肝青象木肺白象金肝得水而沉木得水而浮肺得水而浮金得水而沉其意何也答詞以五音剛柔吸受云云是啟後學要識五行造化之妙而注者又以長生臨官帝旺為言而不就肝肺上究竟其說似訓釋太深玄之又玄者也物物具五行如注所云心脾腎得水皆沉不知又當何解據愚見不若平平講去亦自明暢且又開發後學陰陽相感之義雖不明言而理實寓焉蓋肺雖屬金而位處膈上行陽道多且其經為手太陰主乎氣以體而言金也以用而言氣也而又屬手經故浮肺熟則手經之氣去而金之體獨存故熟則沉也肝雖屬木而位處膈下行陰道多且其經為足厥陰主乎血以體而言木也以用而言血也而又屬足經故沉肝熟則足經之血去而木之體獨存故熟則浮也返本之義也臨官帝旺之說微覺牽合學者詳之六十三難經七十五難金不得平木不字辯生生子曰七十五難云經言東方實西方虛瀉南方補北方何謂也云云故瀉火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也滑伯仁曰不字疑衍四明陳氏曰仲景云木行乘金曰橫內經曰氣有餘則制己所勝而侮所不勝木實金虛是木橫而凌金侮所不勝也木實本以金平之然以其氣正強而橫金平之則兩不相伏而戰戰則實者亦傷虛者亦敗金虛本資氣於土然其時土亦受制未足以資之故取水為金之子又為木之母於是瀉火補水使水勝火則火餒而取氣於木木乃減而不復實水為木母此母能令子虛也木既不實其氣乃平平則金免木凌而不復虛水為金子此子能令母實也所謂金不得平木不得徑以金平其木必瀉火補水而旁治之使木金之氣自然而平耳而滑伯仁又曰陳氏之說亦自有理但為不之一字纏擾牽強費辭不若直以不字為衍文爾余曰不字非衍難經所謂不者乃姑息之謂不徑以金平木故有瀉火補水之治觀越人謂金木水火土當更相平更字與不字乃一篇之大關鍵也此更字與二十難更相乘更相伏更字義同謂互相平制不直令金以平木也觀仲景木行乘金曰橫之橫字則知金非等閒之虛即驟補之猶未能自保況欲令其得平木乎彼金之得平木乃以五行順相平者言也此以五行更相平者言也更與順自當有別不然越人何不徑云補金使得平木而乃曰瀉南方補北方哉越人之微意正欲瀉火以泄木之餘補水以實金之虛五行遞相濟養更互克伐子為母復仇之義故曰欲令金不得平木也此圍魏救韓之意不平之平乃所以平也陳氏訓不字誠是但於更字仍欠發明故未免啟後人之疑醫道如伯仁亦可謂精詣矣乃以不字為衍文余又不知其何見也六十四難經八十一難篇是病二字辯生生子曰八十一難云經言無實實虛虛損不足而益有餘是寸口脈耶將病自有虛實耶其損益奈何然是病非謂寸口脈也謂病自有虛實也云云彼注難經者謂是病二字非誤即衍愚謂二字非誤亦非衍蓋答辭也言此是病之虛而非寸口脈也與夫子答子路曰然有是言也一類皆答問文法爾經書中多有之窮經者能以意逆志而玩其辭斯得之矣六十五節抄靈樞引生生子曰余惟醫以靈素為祖但其書出秦火之後斷簡殘篇幾至散失雖命世之才如秦越人淳于意張華諸公診治稱神奇者亦未之訓釋至啟玄子始於素問掇摭成卷門分章析引類註明厥功亦偉矣而偏執局曲之夫尚吹毛索疵妄加訶詆乃於靈樞非惟不敢注一字且置此書略不涉目夫靈樞一經於臟腑經絡盈虛順逆針法疾徐靡不周悉顧棄而不讀何稱醫哉何稱醫哉余觀史嵩先生序靈樞有曰夫為醫者在讀書讀而不能為醫者有矣未有不讀而能為醫者也余嘗從事斯語用節抄靈樞數條於後以備參考云六十六本神篇黃帝問於岐伯曰何謂德氣生精神魂魄心意志思智慮請問其故岐伯答曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節陰陽而調剛柔如是則僻邪不至長生久視是故怵惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絕而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨酸痿厥精時自下是故五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣是故用針者察觀病人之態以知精神魂魄之存亡得失之意五者以傷針不可以治之也肝藏血血舍魂肝氣虛則恐實則怒脾藏營營舍意脾氣虛則四肢不用五臟不安實則腹脹經溲不利心藏脈脈舍神心氣虛則悲實則笑不休肺藏氣氣舍魄肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息腎藏精精舍志腎氣虛則厥實則脹五臟不安必審五臟之病形以知其氣之虛實謹而調之也六十七決氣篇黃帝曰余聞人有精氣津液血脈余意以為一氣耳今乃辨為六名余不知其所以然岐伯曰兩神相搏合而成形常先身生是謂精何謂氣岐伯曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣何謂津岐伯曰腠理發泄汗出溱溱是謂津何謂液岐伯曰谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液何謂血岐伯曰中焦受氣取汁變化而赤是謂血何謂脈岐伯曰壅遏營氣令無所避是謂脈黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脈之清濁何以知之岐伯曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛酸耳數鳴血脫者色白夭然不澤其脈空虛此其候也黃帝曰六氣者貴賤何如岐伯曰六氣者各有部主也其貴賤善惡可為常主然五穀與胃為大海也六十八脹論黃帝曰夫氣之令人脹也在於血脈之中耶臟腑之內乎岐伯曰二者皆存焉然非脹之舍也黃帝曰願聞脹之舍岐伯曰夫脹者皆在於臟腑之外排臟腑而廓胸脅脹皮膚故名曰脹黃帝曰臟腑之在胸脅腹裡之內也若匣匱之藏禁器也各有次舍異名而同處一域之中其氣各異願聞其故岐伯曰夫胸腹臟腑之郭也膻中者心主之宮城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門戶也廉泉玉英者津液之道也故五臟六腑者各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹三里而瀉近者一下遠者三下無問虛實工在疾瀉黃帝曰願聞脹形岐伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息帝曰脹者焉生何因而有岐伯曰衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五臟更始四時循序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也帝曰脹論言無問虛實工在疾瀉近者一下遠者三下今有其三而不下者其過焉在岐伯曰衛氣相亂陰陽相逐其於脹也當瀉不瀉氣故不下三而不下必更其道氣下乃止不下復始可以萬全烏有殆者乎其於脹也必審其脈當瀉則瀉當補則補如鼓應桴惡有不下者乎六十九五癃津液別篇黃帝問於岐伯曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹余知其然也不知其何由生願聞其道岐伯曰水穀皆入於口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留於膀胱則為溺與氣五臟六腑心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故咳而泣出矣中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出五穀之津液和合而為膏者內滲入於骨空補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並行腸胃之中別於迴腸留於下焦不得滲膀胱則下焦脹水溢則為水脹此津液五別之逆順也七十賊風篇黃帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出室穴之中卒然病者非不離賊風邪氣其故何也岐伯曰此皆嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痹其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉黃帝曰今夫子之所言者皆病人之所自知也其毋所遇邪氣又無怵惕之所志卒然而病者其故何也唯有因鬼神之事乎岐伯曰此亦有故邪留而未發因而志有所惡及有所慕血氣內亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神黃帝曰其祝而已者其故何也岐伯曰先巫者因知百病之勝先知其病之所從生者可祝而已也七十一五音五味篇婦人無須黃帝曰婦人無須者無血氣乎岐伯曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脫血也衝任之脈不榮口唇故須不生焉黃帝曰士人有傷於陰陰氣絕而不起陰不用然其須不去其故何也宦者獨去何去願聞其故岐伯曰宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不榮故須不生黃帝曰其有天宦者未嘗被傷不脫於血然其須不生其何故也岐伯曰此天之所不足也其任沖不盛宗筋不成有氣無血唇口不榮故須不生黃帝曰善乎哉聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形其非夫子孰能明萬物之精是故聖人視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣美眉者太陽多血通髯極須者少陽多血美須者陽明多血此其時然也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥陰常多氣少血少陰常多血少氣太陰常多血少氣此天之常數也七十二憂恚無言篇黃帝問於少師曰人之卒然憂恚而言無音者何道之塞何氣不行使音不彰願聞其方少師答曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也口唇者音聲之扇也舌者音聲之機也懸壅垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開合利其出氣易其厭大而厚則開合難其氣出遲故重言也人卒然無音者寒氣客於厭則厭不能發發不能下至其開合不致故無音黃帝曰刺之奈何岐伯曰足之少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈濁氣乃闢會厭之脈上絡任脈取之天突其厭乃發也七十三邪客篇黃帝問於伯高曰願聞人之肢節以應天地奈何伯高答曰天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五臟天有六律人有六腑天有冬夏人有寒熱天有十日人有手十指辰有十二人有足十指莖垂以應之女子不足二節以抱人形天有陰陽人有夫妻歲有三百六十五日人有三百六十五節地有高山人有肩膝地有深谷人有腋膕地有十二經水人有十二經脈地有泉脈人有衛氣地有草蓂人有毫毛天有晝夜人有臥起天有列星人有牙齒地有小山人有小節地有山石人有高骨地有林木人有募筋地有聚邑人有䐃肉歲有十二月人有十二節地有四時不生草人有無子此人與天地相應者也七十四大惑篇黃帝問於岐伯曰余嘗上於清冷之臺中階而顧匐匐而前則惑余私異之竊內怪之獨瞑獨視安心定氣久而不解獨轉獨眩披髮長跪俯而視之後久之不己也卒然自止何氣使然岐伯對曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視岐視岐見兩物目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽也故陰陽合傳而精明也目者心使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也黃帝曰余疑其然余每之東苑未曾不惑去之則復余唯獨為東苑勞神乎何其異也岐伯曰不然也心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑七十五十二經絡臟象見證附任督二脈起止手太陰肺臟象是經多氣少血肺之為臟六葉兩耳四垂如蓋附著於脊之第三椎中有二十四空行列分布諸臟之氣為五臟華蓋云其經起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內肩下臂上通名曰臑行少陰心主之前臑內廉凡有三脈太陰居前少陰居後厥陰居中也下肘中臂上臑下接處曰肘循臂內上骨下廉臑下掌上名曰臂臂有二骨今太明脈循臂上骨之下廉也入寸口掌後陷中動脈太淵穴也寸口中動脈經渠穴也上魚循魚際魚際穴也散脈中是出大指之端少商穴也其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳嗽上氣喘喝煩心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠虛則肩背痛寒少氣不足以息溺色黃變卒遺失無度手陽明大腸經臟象是經多血多氣大腸長二丈一尺廣四寸徑一寸當臍右回十六曲盛谷一斗水七升半其經之脈起於大指次指之端商陽穴也循指上廉指上廉本節前陷中二間穴本節後陷中三間穴也出合谷兩骨間合谷穴也上入兩筋之中陽谿穴也循臂上廉入肘外廉曲池穴也上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛䪼腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒凜不復足陽明胃經臟象是經多血多氣胃大一尺五寸紆曲屈伸長二尺六寸徑五寸盛谷二斗水一斗五升其經之脈起於鼻之交頞中旁約太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中腿下脛上接處曰膝下循脛外廉謂脛骨之外廉也其外廉下膝三寸三里穴也又下三寸巨虛上廉也又下三寸巨虛下廉也直下至腕中解谿穴也下足跗衝陽穴也足面曰跗跗上陷中動脈是也凡是跗直下大指之間皆有動脈其大指之間足少陽脈也上入指本節後間動脈足厥陰脈也上跗上動脈足陽明脈也針經終始篇云陽明在上厥陰在中少陽在下者是也凡言間皆謂兩指中間也入中指內間中指內間本節後陷中陷谷穴也本節前陷中內庭穴也大指次指之端厲兌穴也其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端是動則病洒洒然振寒善伸數欠顏黑病至則惡人與火聞木音則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔䯒外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃不足則身以前皆寒慄胃中寒則脹滿足太陰脾經臟象是經多氣少血脾廣三寸長五寸掩乎太倉附著於脊之第十一椎其經之脈起於大指之端隱白穴也在大指端內側循指內側白肉際大指內側本節後大都穴也過核骨後核骨下太白穴也核骨在足大指本節後約二寸內踝骨前約三寸如棗核橫於足內側赤白肉際者是也竇太師指為孤拐骨者非是也上內踝前廉內踝下前陷中商丘穴也上踹內循脛骨後交出厥陰之前上膝股內前廉膝輔骨下陷中陰陵泉穴也入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛寒瘧溏瘕泄水閉黃疸不能臥強立股膝內瘇厥足大指不用手少陰心經臟象是經多氣少血心形如未敷蓮花居肺下膈上附著於脊之第五椎其經之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下肺脈從肺系橫出腋下心脈從肺而出於腋下包絡脈從脅下抵腋下下循臑內後廉行太陰心主之後下肘內少海穴也循臂內後廉臂內後廉上脘一寸半靈道穴也抵掌後兌骨之端神門穴也入掌內後廉掌內後廉小指本節陷中少府穴也循小指之內出其端少衝穴也在小指內廉之端是動則病咽乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱手太陽小腸經臟象是經多血多氣小腸長三丈二尺左回迭積十六曲胃之下口小腸上口也在臍上二寸水穀於是入焉復下一寸為水分穴則小腸下口也至是而泌別清濁水液入膀胱滓穢入大腸其經之脈起於小指之端少澤穴也循手外側小指本節前谷穴也本節後陷中後谿穴也上腕臂下掌上節處曰腕腕前起骨中陷中腕骨穴也當腕中陷處陽谷穴也出踝中直上循臂骨下廉出肘內側兩筋之間少海穴也上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可回顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛足太陽膀胱臟象是經多血少氣膀胱縱廣九寸居腎之下大腸之側小腸下口乃膀胱上口水液由是滲入焉盛溺九升九合其經之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中腿下踹上接處約文中央動脈曰膕中委中穴也其支者從髆內左右別下貫胛挾脊內過髀樞竇云髀骨節也循髀外從後廉下合膕中以下貫踹內足肚曰踹出外踝之後崑崙穴也循京骨京骨穴也至小指外側小指外側本節後陷中束骨穴也本節前通谷穴也小指端至陰穴也是動則病沖頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結腨如裂是為踝厥是主筋所生病者痔瘧狂顛疾頭囪頂痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小指不用盛者人迎大再倍於寸口虛者人迎反小於寸口也足少陰腎臟象是經多氣少血腎有兩枚重一斤一兩狀如石卵附著於脊之十四椎當胃下兩旁其經之脈起於小指之下斜走足心湧泉穴也出於然骨之下然骨穴也在內踝前起大骨下陷中循內踝之後內踝之後跟骨之上陷中動脈太谿穴也上太谿二寸復溜穴也別入跟中以上踹內出膕內廉陰谷穴也上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食面黑如地色咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸病飢狀氣不足則善恐心惕惕如人將捕之是謂骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸癖脊臀股內後廉痛痿厥嗜臥足下熱而痛盛者寸口大再倍於人迎虛者寸口反小於人迎也手厥陰心包絡之經是經多血少氣滑伯仁曰心包一名手心主以臟象校之在心下橫膜之上豎膜之下與橫膜相黏而黃脂漫裹者心也其漫脂之外有細筋膜如系與心肺相連者心包也君火以名相火以位手心主代君火行事以用而言則曰手心主以經而言則曰心包絡一經二名實相火也其經之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中曲澤穴也下臂行兩筋之間兩節之上腕三寸間使穴也當腕中大陵穴也入掌中勞宮穴也穴有動脈循中指出其端中衝穴也其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中澹澹大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱手少陽三焦之經是經多氣少血三焦者水穀之道路氣之所終始也上焦在心下下膈在胃上口其治在膻中直兩乳間陷者中中焦在胃中脘當臍上四寸不上不下其治在臍旁下焦當膀胱上口其治在臍下一寸其經之脈起於小指次指之端關衝穴也上出兩指之間兩指之間陷中腋門穴也上兩指本節後間陷中中渚穴也循手表腕陽池穴也出臂外兩骨之間兩骨之間上腕二寸支溝穴也上貫肘天井穴也循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼䪼頰骨也其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用足少陽膽臟象是經多氣少血膽長三寸在肝之短葉間包精汁三合為清淨之府諸府皆傳穢濁獨膽無所傳道故曰清淨膽汁減則目昏又吐傷膽倒則視物倒植其經之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中竇氏云腹下腿上節處是也以下循髀陽出膝外廉下外輔骨之前外輔骨之前膝之下一寸陽陵泉穴也伸足取之直下抵絕骨之端陽輔穴也下出外踝之前丘墟穴也循足跗上入小指次指之間小指次指之間本節前陷中俠谿穴也本節後陷中臨池穴也小指次指之端竅陰穴也其支者別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微塵體無膏澤足外反熱是為陽厥是主骨所生病者頭角頷痛目銳眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小指次指不用足厥陰肝臟象是經多血少氣肝左三葉右四葉凡七葉其治在左其臟在右附著於脊之第九椎其經之脈起於大指叢毛之際大敦穴也上循足跗上廉足跗上廉大指間陷中行間穴也大指本節後間陷中太衝穴也去內踝一寸上踝八寸交出太陰之後內踝前一寸中封穴也上膕內廉曲泉穴也循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺經脈篇是動則病腰痛不可以俯仰丈夫㿗疝婦人小腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆洞泄狐疝遺溺癃閉督脈督之為言都也行背部之中行為陽脈之都綱奇經八脈之一也督脈者起於下極之腧並於脊裡上至風府入腦上巔循額至鼻柱屬陽脈之海也脊之為骨凡二十一椎通項骨三椎共二十四椎自屏翳而起歷長強穴並脊裡而上行循腰腧陽關命門懸樞脊中筋縮至陽陵靈臺神道身柱過風門循陶道大椎啞門至風府入腦循腦戶強間後頂上巔至百會前頂囟會上星神庭循額至鼻柱經素髎水溝兌端至齗交而終焉雲陽脈之海者以人之脈絡周流於諸陽之分譬猶水也而督脈則為之都綱故曰陽脈之海任脈任之為言妊也行腹部中行為婦人生養之本奇經之一脈也任脈者起於中極之下以上毛際循腹裡上關元至喉嚨屬陰脈之海也任與督一源而二岐督則由會陰而行背任則由會陰而行腹夫人身之有任督猶天地之有子午也人身之任督以腹背言天地之子午以南北言可以分可以合者也分之以見陰陽之不雜合之以見渾淪之無間一而二二而一者也任脈起於中極之下會陰之分也由是循曲骨上毛際至中極行腹裡上循關元石門氣海陰交神闕水分下脘建里中脘上脘巨闕鳩尾中庭膻中玉堂紫宮華蓋璇璣天突廉泉上頤循承漿環唇上至齗交分行系兩目下之中央會承泣而終焉云陰脈之海者亦以人之脈絡周流於諸陰之分譬猶水也而任脈則為之總會焉故曰陰脈之海七十六附王好古類集五臟苦欲補瀉藥味肝苦急急食甘以緩之甘草欲散急食辛以散之川芎以辛補之細辛以酸瀉之芍藥虛以生薑陳皮之類補之經曰虛則補其母水能生木腎乃肝之母腎水也苦以補腎熟地黃黃柏是也如無他證錢氏地黃丸主之實則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心心苦緩急食酸以收之五味子欲軟急食鹹以軟之芒硝以咸補之澤瀉以甘瀉之人參黃耆甘草虛以炒鹽補之虛則補其母木能生火肝乃心之母肝木也以生薑補肝如無他證錢氏安神丸主之實則甘草瀉之如無他證錢氏方中重則瀉心湯輕則導赤散脾苦濕急食苦以燥之白朮欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連虛則以甘草大棗之類補之如無他證錢氏益黃散主之心乃脾之母以炒鹽補心實則以枳實瀉之如無他證以瀉黃散瀉之肺乃脾之子以桑白皮瀉肺肺苦氣上逆急食苦以瀉之訶子皮一作黃芩欲收急食酸以收之白芍藥以辛瀉之桑白皮以酸補之五味子虛則五味子補之如無他證錢氏阿膠散補之脾乃肺之母以甘草補脾實則桑白皮瀉之如無他證以瀉白散瀉之腎乃肺之子以澤瀉瀉腎腎苦燥急食辛以潤之知母黃柏欲堅急食苦以堅之知母以苦補之黃柏以咸瀉之澤瀉虛則熟地黃黃柏補之腎本無實不可瀉錢氏止有補腎地黃丸無瀉腎之藥肺乃腎之母以五味子補肺以上五臟補瀉內經藏氣法時論中備言之欲究其精詳看本論臟腑瀉火藥黃連瀉心火木通瀉小腸火黃芩瀉肺火梔子佐之黃芩瀉大腸火柴胡瀉肝火黃連佐之柴胡瀉膽火亦以黃連佐之白芍藥瀉脾火石膏瀉胃火知母瀉腎火黃柏瀉膀胱火柴胡瀉三焦火黃芩佐之以上諸藥各瀉其火不惟止能如此更有治病合為君合為臣處詳其所宜而用勿執一也七十七附李東垣藥類法象用藥法象天有陰陽風寒暑濕燥火三陰三陽上奉之溫涼寒熱四氣是也溫熱者天之陽也涼寒者天之陰也此乃天之陰陽也地有陰陽金木水火土生長化收應之藏下辛甘淡酸苦咸五味是也皆象於地辛甘淡者地之陽也酸苦咸者地之陰也此乃地之陰陽也味之薄者為陰中之陽味薄則通酸苦咸平是也味之厚者為陰中之陰味厚則泄酸苦咸寒是也氣之厚者為陽中之陽氣厚則發熱辛甘溫熱是也氣之薄者為陽中之陰氣薄則發泄辛甘淡平涼寒是也輕清成象味薄茶之類本乎天者親上重濁成形味厚大黃之類本乎地者親下氣味辛甘發散為陽酸苦湧泄為陰清陽發腠理清之清者也清陽實四肢清之濁者也濁陰歸六腑濁之濁者也濁陰走五臟濁之清者也藥性要旨苦藥平升微寒平亦升甘辛藥平降甘寒瀉火苦寒瀉濕熱苦甘寒瀉血熱用藥升降浮沉補瀉法肝膽味辛補酸瀉氣溫補涼瀉心小腸味咸補甘瀉氣