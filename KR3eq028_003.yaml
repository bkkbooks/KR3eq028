痛須用芍藥惡寒而痛加桂惡熱而痛加黃柏如心下痞須用枳實黃連如肌熱及去痰者須用黃芩肌熱亦用黃耆如腹脹用薑製厚朴一本有芍藥如虛熱須用黃耆止虛汗亦用如脅下痛往來潮熱日脯潮熱須用柴胡如脾胃受濕沉困無力怠惰好臥去痰用白朮如破滯氣用枳殼高者用之夫枳殼者損胸中至高之氣二三服而已如破滯血用桃仁蘇木如補血不足須用甘草如去痰須用半夏熱痰加黃芩風痰加南星胸中寒痰痞塞用陳皮白朮多用則瀉脾胃如腹中窄狹須用蒼朮如調氣須用木香如補氣須用人參如和血須用當歸凡血受病者皆當用也如去下焦濕腫及痛並膀胱有火邪者必須酒洗防己草龍膽黃柏知母如去上焦濕及熱須用黃芩瀉肺火故也如去中焦濕與痛熱用黃連能瀉心火故也如去滯氣用青皮勿多服多則瀉人真氣如渴者用乾葛茯苓禁半夏如嗽用五味子如喘者用阿膠如宿食不消須用黃連枳實如胸中煩熱須用梔子仁如水瀉用白朮茯苓芍藥如氣刺痛用枳殼看何部分以引經藥導使之行則可如血刺痛用當歸詳上下用根梢如瘡痛不可忍者用寒苦藥如黃柏黃芩詳上下用根梢及引經藥則可如眼痛不可忍者用黃連當歸根以酒浸煎如小便黃者用黃柏數者澀者或加澤瀉如腹中實熱用大黃芒硝如小腹痛用青皮如莖中痛用生甘草梢如驚悸恍惚用茯神如飲水多致傷脾用白朮茯苓豬苓如胃脘痛用草豆蔻凡用純寒純熱藥必用甘草以緩其力也寒熱相雜亦用甘草調和其性也中滿者禁用經云中滿勿食甘用藥凡例凡解利傷風以防風為君甘草白朮為佐經云辛甘發散為陽風宜防風味辛及治風通用故防風為君甘草白朮為佐凡解利傷寒以甘草為君防風白朮為佐是寒宜甘緩也或有別證於前隨證治病藥內選用分兩以君臣論凡眼暴發赤腫以防風黃芩為君以瀉火以黃連當歸根和血為佐兼以各經藥用之凡眼久病昏暗以熟地黃當歸根為君以羌活防風為臣甘草甘菊之類為佐凡痢疾腹痛以白芍藥甘草為君當歸白朮為佐見血先後以三焦熱論凡水瀉以茯苓白木為君芍藥甘草為佐凡諸風以防風為君隨治病為佐凡嗽以五味子為君有痰者以半夏為佐喘者以阿膠為佐有熱無熱以黃芩為佐但分兩多寡不同耳凡小便不利黃柏知母為君茯苓澤瀉為佐凡下焦有濕草龍膽防己為君甘草黃柏為佐凡痔漏以蒼朮防風為君甘草芍藥為佐詳別證加減凡諸瘡以黃連當歸為君甘草黃芩為佐凡瘧以柴胡為君隨所發時所屬經分用引經藥佐之以上皆用藥之大要更詳別證於前隨證治病藥內逐旋加減用之東垣報使太陽羌活下黃柏陽明白芷升麻下石膏少陽柴胡下青皮太陰白芍藥少陰知母厥陰青皮柴胡小腸膀胱屬太陽藁本羌活是本方三焦膽與肝包絡少陽厥陰柴胡強陽明大腸兼足胃葛根白芷升麻當太陰肺脈中焦起白芷升麻蔥白鄉脾經少與肺經異升麻芍藥白者詳少陰心經獨活主腎經獨活加桂良通經用此藥為主更有何病到膏肓十二經嚮導手太陰肺南星款冬花升麻桔梗山藥檀香五味子粳米白茯苓阿膠天門冬麥門冬桑白皮蔥白杏仁麻黃益智丁香白豆蔻知母砂仁檀香豆蔻為使梔子黃芩石膏足太陰脾草豆蔻茱萸砂仁人參益智為使防風當歸益智黃耆蒼朮白朮膠飴代赭石茯苓麻子甘草半夏通入手足太陰肺脾升麻芍藥木瓜白芍藥藿香延胡索砂仁手陽明大腸升麻白芷麻子秦艽薤白白石脂砂仁白石脂為使肉豆蔻石膏足陽明胃丁香草豆蔻砂仁防風石膏知母白朮神麯葛根烏藥半夏蒼朮升麻白芷蔥白通入手足陽明麻黃酒大黃酒連翹升麻白朮葛根石膏檀香佐以他藥白芷手少陽三焦川芎大黃酒柴胡青皮白朮熟地黃耆地骨皮石膏細辛附子足少陽膽半夏草龍膽柴胡通入手足少陽青皮川芎柴胡連翹手厥陰心包絡沙參白朮柴胡熟地牡丹皮敗醬足厥陰肝草龍膽蔓荊子阿膠瞿麥桃仁山茱萸代赭石紫石英當歸甘草青皮羌活吳茱萸白朮通入手足厥陰青皮熟地柴胡川芎皂角苦茶桃仁手太陽小腸白朮生地黃羌活赤茯苓赤石脂砂仁赤石脂為使足太陽膀胱蔓荊子滑石茵陳白茯苓豬苓澤瀉桂枝黃柏羌活麻黃通入手足太陽防風羌活藁本蔓荊子茴香黃柏白朮澤瀉防己大黃酒手少陰心麻黃桂心當歸生地黃連代赭石紫石英梔子獨活赤茯苓足少陰腎知母黃柏地骨皮阿膠豬膚牡丹皮玄參敗醬牡蠣烏藥山茱萸天門冬豬苓澤瀉白茯苓檀香甘草五味子吳茱萸益智丁香獨活桔梗或用梢砂仁黃柏茯苓為使通入手足少陰細辛熟地五味子澤瀉地榆附子知母白朮七十八本草攻克血積癥瘕及胎產解毒並十八反藥類敘此以便立方採擇雖不立方而方在其中矣攻克血積癥瘕類延胡索三稜蓬朮川芎歸尾使君子大戟紅花蘇木黑醜續隨子麝香雷丸神麯白芷海螵蛸桃仁虻蟲水蛭乾漆木香通草牛膝山楂大黃瞿麥射干麥芽水銀碙砂鱉甲肉積類碙砂阿魏山楂甚者巴豆酒積類葛根葛花神麯麥芽黃連青蒿巴豆甚者甘遂牽牛魚積類橄欖蘆根草果紅曲甚者巴豆芫花血積類歸尾桃仁紅花蘇木牛膝乾漆丹參大黃甚者虻蟲水蛭氣積類木香檳榔沉香檀香烏藥枳殼青皮枳實甚者黑醜水積類黑醜澤瀉豬苓郁李仁海藻昆布甚者芫花大戟甘遂商陸涎積類雄黃膩粉枯礬甚者礞石巴豆瓜蒂甘遂輕粉痰積類半夏南星竹瀝礞石枳實海石蠍梢皂莢甚者瓜蒂藜蘆巴豆食積類砂仁香附麥芽青皮枳實神麯穀芽紅曲草果甚者巴豆蟲積類薏苡根吳茱萸根酸石榴根使君子雷丸蕪荑乾漆檳榔甚者苦楝根皮錫灰輕粉鶴蝨諸瓜果積平胃散加健脾消導倍加肉桂加麝香尤妙豆腐積蘿蔔子豆粉積杏仁諸骨