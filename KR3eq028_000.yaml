body:
  text: 敘醫之為道豈眇小乎哉陶鑄天地和順陰陽宣節氣化措民物而置安全其效與粒食蒸民者同功而其立言祕旨可等潔淨精微之蘊脫若性非霽哲養非深邃蘊積非以歲年與夫受衷非慈祥長厚則無能窺閫奧以觀其妙調瘥癘回夭札而登之康寧黃髮也世之業是術者非不紛然夥矣類眯謬自用有稱名家亦操方書為套本鮮濟則委天命不可為偶而獲效輒揚揚矜詡其能益自信執方之為便以斯職業安望其究素靈之真詮晰和扁之渺緒哉醫道之小業醫者自小之也余族叔文垣沖年以機穎俊奕著比受易了了昭徹大義孰師殊異之舞象而後訪兄之括蒼遇異人以禁方相授歸則會乃翁疾即由儒從業又念良醫以意中而執方為下簡籍所載古人之意存焉乃發藏書讀之上自靈樞素難下及古今名家靡不翻閲又非徒然搜獵古人之言詮務因言詮融洽古人之神髓居而心惟出而廣詢近而丘里鄉國之士靡不咨遠而江淮河漢之險靡不蹈就專門以叩厥祕宗儒碩以研厥精積之三十年所獨智益徹而理窾益融於凡天地間浮沉升降之機陰陽闔闢之運氣化推遷消息盈縮之數人身之寒熱虛實順逆表裡之異鏡瑩於中其治病也察天時稽氣運審受病之因酌君臣佐使之用故投劑輒效籍籍稱奇矣何論葆和尊人以及太耋而新都之巨閥窮簷與三吳之顯貴隱約靡不飲其湯液而稱有喜也且也曰以其已試者輯而録之又採諸名家言與人辨難等語彙編成集名曰醫旨緒餘是集也三才之理明五行之義著相火之辨暢以達三焦之位論而確以至臟腑之分配症名之異同經絡之流貫呼吸之本原脈義之考診法治法之定靡不備載又列前賢之長以標其善簡册雖約而其遠宗之正近取之周考核之精謙沖之度一集而四善具焉猶曰緒餘惡有能出其右而稱渺論哉昔皇甫有言人而不精醫道雖有忠孝之心仁慈之性君父危困赤子顛連將何以濟余不佞謂叔精詣若是咸可濟之矣故掇拾其概而為之序觀者慎毋謂余屬宗親而言近阿哉族子燁元素頓首拜撰
