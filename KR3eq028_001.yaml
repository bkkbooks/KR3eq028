body:
  text: 上卷一太極圖抄引生生子曰天地萬物本為一體所謂一體者太極之理在焉故朱子曰太極只是天地萬物之理在天地統體一太極在萬物萬物各具一太極即陰陽而在陰陽即五行而在五行即萬物而在萬物夫五行異質四時異氣皆不能外乎陰陽陰陽異位動靜異時皆不能離乎太極人在大氣中亦萬物中一物爾故亦具此太極之理也惟具此太極之理則日用動靜之間皆當致夫中和而不可須離也醫之為教正示人節宣天地之氣而使之無過不及攻是業者不能尋繹太極之妙豈知本之學哉故具太極圖抄於首簡二太極圖三太極圖説附中和集太極圖説山陽度氏曰上之一圈者太極本然之妙也及其動靜既分陰陽既形而其所謂上之一圈者常在乎其中蓋本然之妙未始相離也至於陰陽變合而生五行水火木金土各具一圈者所謂分而言之一物一太極也水而木木而火火而土土而金復會於一圈者所謂合而言之五行一太極也然其指五行之合也總水火木金而不及土者蓋土行四氣舉是四者以該之兩儀生四象之義也其下一圈為乾男坤女者所謂男女一太極也以見太極之妙流行於天地之間者無物不在而無物不然也中和集曰上之一圈者釋曰圓覺道曰金丹儒曰太極所謂無極而太極者不可極而極之謂也釋氏云如如不動了了常知易系云寂然不動感而遂通丹書云身心不動以後復有無極真機言太極之妙本也是知三教所尚者靜定也周子所謂主於靜者是也蓋人心靜定未感物時湛然天理即太極之妙也一感於物便有偏倚即太極之變也苟靜定之時謹其所存則天理常明虛靈不昧動時自有主宰一切事物之來俱可應也靜定工夫純熟不期然而自然至此無極之真復矣太極之妙應明矣天地萬物之理悉備於我矣四不知易者不足以言太醫論生生子曰天地間非氣不運非理不宰理氣相合而不相離者也何也陰陽氣也一氣屈伸而為陰陽動靜理也理者太極也本然之妙也所以紀綱造化根柢人物流行古今不言之蘊也是故在造化則有消息盈虛在人身則有虛實順逆有消息盈虛則有範圍之道有虛實順逆則有調劑之宜斯理也難言也包犧氏畫之文王彖之姬公爻之尼父贊而翼之黃帝問而岐伯陳之越人難而詁釋之一也但經於四聖則為易立論於岐黃則為靈素辨難於越人則為難經書有二而理無二也知理無二則知易以道陰陽而素問而靈樞而難經皆非外陰陽而為教也易理明則可以範圍天地曲成民物通知乎晝夜靈素難經明則可以節宣化機拯理民物調燮札瘥疵癧而登太和故深於易者必善於醫精於醫者必由通於易術業有專攻而理無二致也斯理也難言也非獨秉之智不能悟亦非獨秉之智不能言也如唐祖師孫思邈者其洞徹理氣合一之旨者歟其深於易而精於醫者歟其具獨秉之智者歟故曰不知易者不足以言太醫惟會理之精故立論之確即通之萬世而無敝也彼知醫而不知易者拘方之學一隅之見也以小道視醫以卜筮視易者亦蠡測之識窺豹之觀也惡足以語此五問三才所同者於人身何以見之生生子曰人之與天地萬物同者同此理氣也朱子曰人之與物本天地之一氣同天地之一體也故能與天地並立而為三才皇極經世曰天有四時地有四支四支各有脈也一脈三部一部三候以應天數神統於心氣統於腎形統於首形氣交而神主其中三才之道也攖寧生卮言曰天地非大氣鼓韝則寒暑不能以時潮汐不能以訊霜露冰雪不能以其候人身非此氣鼓韝則津液不得行呼吸不得息血脈不得流通糟粕不得傳送也內經陰陽應象大論曰天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣卮言曰人首尊而足卑天地奠位也脾肺相為母子山澤通氣也肝膽主怒與動雷風之相搏也心高腎下水火不相射也此人之所以與天地參而為三也六命門圖説生生子曰天人一致之理不外乎陰陽五行蓋人以氣化而成形者即陰陽而言之夫二五之精妙合而凝男女未判而先生此二腎如豆子果實出土時兩瓣分開而中間所生之根蒂內含一點真氣以為生生不息之機命曰動氣又曰原氣稟於有生之初從無而有此原氣者即太極之本體也名動氣者蓋動則生亦陽之動也此太極之用所以行也兩腎靜物也靜則化亦陰之靜也此太極之體所以立也動靜無間陽變陰合而生水火木金土也其斯命門之謂歟素問曰腎藏骨髓之氣又曰北方黑色入通於腎開竅於二陰藏精於腎難經曰男子以藏精非此中可盡藏精也蓋腦者髓之海腎竅貫脊通腦故云生生子曰三十六難言腎有兩臟其左為腎右為命門命門者諸神精之所舍男子以藏精女子以系胞故知腎有二也三十九難言五臟亦有六臟者謂腎有兩臟也其左為腎右為命門命門者精神之所舍也男子以藏精女子以系胞其氣與腎通細考靈素兩腎未嘗有分言者然則分之者自秦越人始也追越人兩呼命門為精神之舍原氣之系男子藏精女子系胞者豈漫語哉是極歸重於腎為言謂腎間原氣人之生命故不可不重也黃庭經曰腎氣經於上焦營於中焦衛於下焦中和集曰闔闢呼吸即玄牝之門天地之根所謂闔闢者非口鼻呼吸乃真息也越人亦曰腎間動氣者人之生命五臟六腑之本十二經脈之根呼吸之門三焦之原命門之義蓋本於此猶儒之太極道之玄牝也觀銅人圖命門穴不在右腎而在兩腎俞之中可見也難經雖有命門之説並無左右水火之分何後人妄臆指命門屬相火耶顧靈素三陰三陽手足十二經配合皆有定偶以象十二時十二月十二律之意今又以命門為屬火則當統之於何經十二經既無所統則兩腎皆屬少陰水可知黃庭經曰兩部腎水對生門左腎為壬右腎為癸生門者臍也或曰然則脈訣何謂命門配三焦屬相火也余曰此高陽生之誤戴同父辨之已詳三焦是手少陽經配手厥陰經為表裡乃手經配手經火配火為定偶也豈有手配足火配水之理哉滑伯仁難經本義注曰命門其氣與腎通則亦不離乎腎其習坎之謂歟坎者水也易謂上下二坎相重陰而又陰故曰習坎手心主為火之閏位命門即水之同氣歟命門不得為相火三焦不與命門配亦明矣虞庶亦云諸家言命門為相火與三焦為表裡按難經只有手心主與三焦為表裡無命門三焦表裡之説據此則知諸家所以紛紛不決者蓋有惑於金匱真言篇王注引正理論謂三焦者有名無形上合手心主下合右腎遂有命門三焦表裡之説夫人身之臟腑一陰一陽自有定偶豈有一經兩配之理哉夫所謂上合手心主者正言其為表裡下合右腎者則以三焦為原氣之別使而言之爾知此則知命門與腎通三焦無兩配而諸家之説不辨而自明矣或曰如子所云則命門屬水歟豫曰右腎屬水也命門乃兩腎中間之動氣非水非火乃造化之樞紐陰陽之根蒂即先天之太極五行由此而生臟腑以繼而成若謂屬水屬火屬臟屬腑乃是有形質之物則外當有經絡動脈而形於診靈素亦必著之於經也或曰然則越人不以原氣言命門而曰右腎為命門何也豫曰此越人妙處乃不言之言也言右腎則原氣在其中矣蓋人身之所貴者莫非氣血以左血右氣也觀黃帝陰符經曰人腎屬於水先生左腎象北方大淵之源次生右腎內有真精主五行之正氣越人故曰原氣之所繫信有核歟或曰靈素命門有據乎豫曰陰陽離合篇有太陽根起於至陰結於命門至陰穴名在足小指外側啓玄子注曰命門者藏精光照之所則兩目也靈樞亦曰命門者目也蓋太陽乃腎之表目者宗脈精華之所聚故特以精華之所聚處而名之為命門也上釋命門七右腎水火辨或曰人皆謂右腎屬相火相火即少火觀坎之象則知腎具水火之道一陽居二陰間為坎水火併而為腎故惟坎加習也子以右腎為屬水然則其説非與余曰以惟坎加習斯其説所以非也夫坎水也上下皆坎易故曰習坎觀先天圖乾南坤北後天圖離南坎北五行火高水下故仙家取坎填離以水升火降既濟為道謂採坎中之一陽填離中之一陰此還乾坤本源之意也坎離是兌待之義如彼謂一陽居二陰之間無乃指一陽為火耶然則離以一陰居二陽之間又作何説也夫物物具五行五行一陰陽陰陽一太極五臟均有此金木水火土何乃指坎中之陽為火指右腎為少火也坎中之陽即兩腎中間動氣五臟六腑之本十二經脈之根謂之陽則可謂之火則不可故謂坎中之陽亦非火也二陰即二腎也腎既皆陰則作一水一火併看者亦非矣不然坎中之陽尚不可以火目之而右腎又何可以屬水哉或曰子是之言固矣彼北極玄帝象下有龜蛇者何説也且昔沙隨程可久曰北方常配二物故惟坎加習於物為龜為蛇余曰此何可以證水火併而為腎之謬也蓋龜蛇乃道家寓意處謂蛇屬心火龜屬腎水能降此二物不使妄動庶坎離得以交姤而身中之丹可成若腎則封藏之本精之處也安可牽扯龜蛇而與之同類並觀哉斷乎其不可矣八或問七節之傍中有小心或指下第七節命門穴為小心者有以小心為志心者有以小心為少火以少火為相火者九難經正義三焦評附東垣三焦論或有以馬玄臺難經正義問於生生子曰馬氏謂難經所言三焦乃上中下之三焦故曰無形之氣若於手少陽之三焦乃是有形引靈樞素問經旨及東垣等論為證而以手厥陰配合俱寓診於右尺子以其説為何如幸條悉之以詔來學生生子曰馬玄臺搜究經旨甚博考證諸篇極工緻非苦心者不能也但謂三焦有二上中下之三焦行脈道以通十二經手少陽之三焦惟司決瀆之職而已謂東垣能疑之而不能正之又引三因方謂脂膜如手掌大者為三焦而寓診於右尺斯言不能無弊何也上古文字不容易看亦有不可強解者亦非聰明所可臆度不可辨者寧缺之不敢妄議恐增後人一障也姑即所疑條陳於左以俟明哲馬氏曰手少陽三焦焦當作膲是有形物也上中下之三焦焦字從火謂能腐熟水穀變化也余按焦字亦不一靈樞背腧篇有云肺腧在三焦之間心腧在五焦之間據銅人圖肺腧在三椎下心俞在五椎下是以焦字作椎字看也椎槌也節也斯上中下之三焦亦是以地段三停而言如雲上中下三節也焦膲同用如藏臟同用也不必拘從火從肉但觀上下文義何如爾推馬氏之意不過謂從肉則是有形從火則是無形蓋為有形無形生疑也馬氏曰三因方云古人左為腎臟其府膀胱右為命門其府三焦三焦有脂膜如手大且曰宋有舉子徐遁者醫療有精思曰齊嘗大飢群丐相臠而食有一人皮肉盡而骨脈全者視其五臟見右腎之下有脂膜如手大者正與膀胱相對有二白脈自其中出夾脊而上貫腦意此即導引家所謂夾脊雙關者而不悟脂膜如手大者之為三焦也由是知三焦為有形也按導引家夾脊雙關正是兩腎非別有物也愚謂此言無稽不必信也蓋醫以靈素為宗靈素不載如張仲景華他王叔和孫思邈皆擅名古今者未有一言及此史載秦越人隔垣洞見人臟腑者假令三焦如手掌大何不言之而反曰無形之氣又觀手少陽經起止散絡亦無夾脊貫腦之説獨陳無擇言之豈無擇之神知出靈素諸公之上而操議以勝之哉愚故謂無稽之言不必信也余惟人身稟賦有肥瘠有長短有男作女形女作男形臟腑亦有厚薄之不一人臟內景殆與豬相類兩腎即兩腰子兩腰子皆裹於脂膜之中間或有偏長短者不可因脂膜之垂長者便指為臟腑也兩白脈自中出者正腎之脈絡爾膀胱中處腹下亦非偏於左者抑何相對若是之偶耶據云大飢而相臠安有舍美腎而不食尚從容乎有所待也此不待辨而可知若脂膜左右長短不同由人之肥瘠也且如平人之膽僅藏汁三合薑維之膽大如斗平人喉管二一通氣一通食銅人圖有載大賊歐希範之喉管有三彼陳無擇者抑信之否乎三焦既有形若是銅人圖必圖而表之華氏內照圖亦必表而出之何一陽曰世傳華他神目置人裸形於日中洞見其臟腑是以象圖俾後人準之為論治規範三國時殺人亦不少華他之醫不可謂無精思豈有三焦如是乃遺而不之載哉何一陽又曰余先年精力時以醫從師徵南歷剖賊腹考驗臟腑心大長於豕心而頂平不尖大小腸與豕無異惟小腸上多紅花紋膀胱真是脬之室余皆如難經所云亦無所謂脂膜如手掌大者余謂心小腸屬火故色皆赤三焦亦屬火色獨如脂膜是不可信矣顧戴同父氏有言曰三因方之好異也云三焦有形如脂膜附於腎夾脊若果如是則內經難經言之矣其經脈又何偏屬歷絡之云乎醫學辨疑俗斷極叱其非惜乎人未之考也徐遁之説出龍川志而陳無擇因之且引難經男子藏精女子系胞二句於夾脊貫腦之下是認命門為三焦也差舛如此何可信哉黃帝陰符經有曰二腎內生白脈二條上湧朝元通靈陽之宮迹此觀之舛可知矣或曰子以難經三焦無形之言為是何靈樞本臟篇皆謂有厚薄緩急直結縱橫惟其有形乃有此語余曰本臟篇論三焦者非特為三焦有物如是也厚薄直結緩急等語為膀胱而言也合通篇臟腑配應而觀其義自見據五臟各有一腑為應三焦為孤腑上中下三焦同號為孤腑又為外府又為中瀆之府按瀆者水也膀胱為津液之府津液亦水也三焦為決瀆之官膀胱之用也又為腎間原氣之使以其無形故附膀胱而言之何以然黃帝曰願聞六腑之應岐伯答曰肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應帝曰應之奈何岐伯曰肺應皮皮厚者大腸厚皮薄者大腸薄云云腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也三焦原非五行正府而無所應故稱外府孤府因帝以六腑之應為問三焦既為膀胱之用原氣之使故以膀胱合而應之以答六腑之應如此也又本輸篇曰肺合大腸大腸者傳導之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五穀之府腎合膀胱膀胱者津液之府此五臟五腑五行正配合者也獨少陽三焦無合乃復曰少陽屬腎腎上連肺故將兩臟三焦者中瀆之府水道出焉屬膀胱是孤之府也千金方論孤府亦同是六腑之所與合者合二篇觀之三焦屬腎與膀胱故附膀胱而言非為三焦有物如是也論勇篇之縱橫及諸篇言有形者多類此彼陳無擇之脂膜果有理疏理密直結縱橫也乎哉無擇之好異而故為之辭也泰來曰觀五腑皆有合有應惟三焦無合無應因下焦為足太陽所管攝故稱足三焦足三焦者足太陽之別絡也非另有一個足三焦也據云中瀆之府水道出焉屬膀胱是孤之府等語即知諸言有形者皆是言膀胱以膀胱乃下焦之地位膀胱主水三焦職司決水故並言之或曰三焦既無形如此何氣府篇有少陽脈氣所發者三十二穴繆刺篇有少陽之絡經脈篇有三焦少陽之脈經別篇有少陽心主之正經筋篇有少陽心主之筋衛氣篇有少陽心主之本陰陽二十五人篇言手少陽之上血氣盛則眉美而長等語似涉有形今曰無形然則彼皆非耶余曰所謂有形者指其經依附各屬經絡而流貫者言也蓋手少陽乃十二經中之一經其動脈原有起止亦有脈絡經筋俞穴出入相應以經絡乎上中下一身也非謂無其經脈而虛作一氣看也因有此經故有此病云無形者指其府也以其無特形故稱外府非若五府稱赤腸白腸黃腸青腸黑腸長若干重若干受盛若干云云若獨指其經脈起止俞穴主病等語便謂是有形之府不思奇經中如沖任督等脈皆有起止亦皆主病沖為血海任主胞胎亦可指衝任等脈如有形府例看否耶有形之説不必辨而其謬自明矣馬氏曰東垣此事難知問三焦有幾似嘗究心於此者惜乎謂三焦有二者不及上中下之三焦則誤矣是欲闡內經而內經之義未融欲正難經而難經之言仍在也余曰此事難知乃王好古所著好古為東垣高弟問三焦有幾者非為手少陽三焦當分上中下為二也是欲人知三焦有手足之分爾手少陽三焦主持於上足三焦主持於下足三焦者足太陽膀胱之別也若將手少陽三焦又分出一個上中下三焦合足三焦觀之得無有三個三焦耶則鑿矣好古此篇分三焦甚有功但謂命門包絡於右尺同診又謂包絡亦有三焦之稱為命門之火遊行於五臟六腑之間主持於內也云云似亦未究相火命門之義難經雖有命門之説未嘗言其為火觀男子以藏精一句則知右腎非火矣矧經曰精者水也又曰其氣與腎通水與火可相混耶都緣惑於高陽生脈訣以三焦配命門而張世賢圖難經脈訣又以心包絡皆混配命門三焦於右尺故有命門屬火之説何一陽醫學統宗極劾其盜襲訛言紊陳圖局誣世釣譽夫命門乃兩腎中間動氣人之生命所司故曰精神之所舍原氣之所繫觀銅人圖圖命門穴於兩腎俞中間深為得旨泰來曰三焦總只一而已言手三焦者以其經屬手少陽又其治在膻中緣手經經乎上也言足三焦者以其經即足太陽之別絡又其治在氣衝緣足經經乎下也靈素以下焦備六腑之數即知手少陽三焦與下焦之三焦總只一而已馬玄臺曰命門之脈不必拘於右尺以其氣與腎通也顧腎間動氣人之生命左腎亦可以診之據其將右腎入左尺同診者是要出右尺部位庶三焦包絡始有診地也又欲使人知是前人之意故託言王叔和脈訣歌云右肺大腸脾胃命由是以三焦包絡寓診於右尺也愚謂玄臺博究如此豈有不識脈訣非叔和書哉正若三焦包絡二脈無所歸著不得已而引脈訣歌為證仍稱王叔和之名者不過要使人尊信也抑不思叔和脈經寸關尺之診上部合於上焦關部合於中焦尺部合於下焦兩尺皆以腎為候而無三焦包絡左右之分千金方載列亦同今人不體認脈訣之非往往為其牽縛又強扶而合之亦大可嘆也戴同父脈訣刊誤首篇闢之甚詳真千載斷案讀之亥豕自見毋用多喙馬氏謂心火面北君道也故居寸上相火面南臣道也故居尺下三焦包絡皆屬相火故寓於右尺下部診之余曰此強合之辭也人多不思相火命名之義往往以陰火作相火看故溯洄集辨之包絡乃護心之脂膜不離於心膻中氣海三焦之所布皆在膈上與心相近故稱曰相火以其為君火之相也余竊謂相猶宰相輔成君德位必相近今馬氏以三焦包絡二脈診法部位無所著落是為診法部位而言非為君臣尊卑定南北也論定分則君臣尊卑有南北論診法則部位之居有遠近勢也亦理也包絡之護心與宰相之近君一也若將包絡居尺下則與心遠矣世豈有遠離於君而謂之相哉此又可以例觀矣且經謂上以候上下以候下者均此理勢也按洪範五行火曰炎上水曰潤下難經亦曰火炎上而不能下故在上部水流下行而不能上故在下部今以南北尊卑之勢紊而使居下部豈不背經義哉徒拘拘以君臣尊卑而言則肺亦臣也經曰肺者心之蓋也抑何反加於心之上耶蓋肺相傅之官位近心君故治節由之是以同處於膈上也觀素問三焦包絡皆處膻中蓋膻中者臣使之官喜樂出焉以近心君故喜樂由之又三焦為氣父包絡為血母從心肺而言也以心主血肺主氣皆居膈上故曰膻中之分父母居之氣之海也是故不得而居於右尺下部也謝堅白難經本旨亦推宗脈經謂手厥陰即手少陰心脈同部三焦脈上見寸口中見於關下焦與腎同診此其説殊合經旨千古不易之定論也或曰三焦下合右腎子以其説然歟否歟余曰此啓玄子引正理論之言不知何所據遍考靈素只有上合手心主一句無下合右腎之説或曰然則與手心主配合為表裡者何也余曰手少陽三焦之脈布膻中散絡心包手厥陰心主之脈出屬心包絡下膈歷絡三焦因其脈上下交絡故也又俱屬手經均為相火以類相從雖為表裡終非五臟五腑比也此何以故余曰為是非也蓋藏有聲色臭味府有出納受盛二經無聲色臭味出納受盛雖是表裡實非臟腑比也素問運氣篇曰心包非臟也三焦非腑也余故曰以類相從也或曰馬氏謂上中下之三焦行脈道以通十二經手少陽之三焦惟司決瀆之職而已豫以為非耶余曰噫嘻人之好異也經書豈容易言哉圭齋歐陽公曰難經先秦古文蓋為醫式之祖也東坡蘇公曰醫之難經句句皆理字字皆法後世達者神而明之如珠走槃如槃走珠無不可者若出新意而棄舊學以為無用非愚無知則狂而已看書之法當以意會其理而融其辭不可執己見以害其意夫所謂三焦者乃上焦中焦下焦三處地位合而名之也以手少陽經統而屬之以合十二經之數人之有十二經猶日之有十二時歲之有十二月也上焦主納而不出其治在膻中中焦主腐熟水穀其治在臍旁下焦分別清濁主出而不納其治在臍下滑伯仁曰治猶司也猶郡縣治之治言三焦所治之地方在斯也有以呼上焦為三焦者如雲三焦為氣之父指上焦之氣海而言也是上焦亦可以三焦稱也有以呼中焦為三焦者如雲三焦咳狀咳而腹滿不欲飲食比皆聚於胃關於肺者是也是中焦亦可以三焦稱也有以下焦呼為三焦者如雲決瀆之官中瀆之府者是也是下焦亦可以三焦稱也此三焦者外有經而內無形故曰外府明非五臟五腑之有合應也又曰孤府袁淳甫難經本旨曰所謂三焦者於膈膜脂膏之內五臟五腑之隙水穀流化之關其氣融會於其間熏蒸膈膜發達皮膚分肉運行四旁曰上中下各隨部分所屬而名之實元氣之別使也是故雖無其形倚內外之形而得名雖無其實合內外之實而為位者也靈樞經曰上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行還至陽明上至舌下足陽明常與營俱行陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰觀此則秦越人謂作水穀之道路氣之所終始者為不誣矣中焦亦並胃中而出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血下焦者別回腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉觀此下焦之文則純是決瀆之事馬氏乃謂上中下之三焦以氣看手少陽之三焦作有形府看謂其惟司決瀆之職而已分三焦為二何其謬哉靈蘭祕典曰三焦者決瀆之官水道出焉瀆猶江河淮濟之瀆爾雅曰瀆者獨也各獨出其所而入海也夫決瀆本下焦之事決瀆之官猶今之總督河道之職也今以三焦之名而獨任下焦之職此其故何哉蓋以水瀆在下非氣莫導膀胱所藏之水必待氣海之氣施化乃為泄便注泄是故以三焦治之謂賴其氣而為之前導也故曰氣化則能出矣若曰不必下焦之氣施化而手少陽自能決而出焉則經不當復繳氣化則能出矣之句或曰三焦是六腑之一故決瀆由之恐不可作下焦看也余曰此正是馬氏所疑之處馬氏以手少陽三焦為腑惟司決瀆下焦非腑也故作氣看不思素問宣明五氣篇曰胃為氣逆為噦為恐大腸小腸為泄下焦溢為水膀胱不利為癃不約為遺溺膽為怒又靈樞九針篇曰六氣為病膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺溺下焦溢為水據此二篇則靈素亦以下焦備六腑之數是下焦與三焦無彼此也是故不分而為二也王好古雖引靈樞謂有足三焦之説緣足三焦乃太陽之別絡別絡乃支絡並太陽之正入絡膀胱約下焦約是約束也實則閉癃虛則遺溺雖有足三焦之名實則足太陽之絡脈也蓋下焦乃足經之所屬故即膀胱言之也本臟篇言腎合三焦膀胱亦以此故好古此問不過欲人知此義爾實無二質可分也諸家言有形狀有俞穴者皆不過即其經脈而言如奇經沖任督之類也噫夫難經靈素之翼也脈經診候之宗也難經載心包絡命門三焦者凡八篇脈經闡靈素之要旨推脈候之本原噫醫學至秦越人亦神矣至王叔和亦可稱精思矣二公殫心究竟著述垂訓亦可謂無滲漏矣乃陳無擇不信難經而信龍川不核之方志世人不宗王叔和脈經而宗高陽生之脈訣且也妄肆譏彈是何異河伯而議海若之汪洋處蟻封而談藐姑射之靈祕哉多見其不知量也余為此辨豈不知將益增嘵嘵之口顧後之人惑於其説而莫之覺願為秦王忠臣也或毀或譽何暇計哉孔子曰知我者其惟春秋乎罪我者其惟春秋乎余私心竊欲自附云附東垣三焦論東垣云三焦有名無形主持諸氣以象三才之用故呼吸升降水穀往來皆恃此以通達是以上焦在心下主內而不出中焦在胃中脘主腐熟水穀下焦在臍下主分別清濁出而不內統而論之三才之用本於中焦中焦者胃脘也稟天五之沖氣陰陽清濁自此而分十二經絡自此而始或不得其平則寒熱偏勝虛實不同榮衛澀滯清濁不分而生諸病故曰氣會三焦手少陽脈通於膻中膻中者臣使之官為氣之海審此則知三焦者沖和之本也三焦相火及包絡之脈人之元氣也周身何處無之是名相火用事主持陰陽之氣神明之府也出醫學發明十問診三焦包絡或有難於生生子曰心主包絡三焦之説已得聞命矣但診法尚未詳明如子所言動脈下行於足經者法當診於下部歟誠如是令人之惑滋甚也且足經腎肝之動脈皆不上行於手又何故取法於手之尺部而診腎肝耶請再悉之余曰嘻如上所疑是殆未知寸關尺上下陰陽之義也夫脈之一字有二義焉十二經之動脈乃路陌之脈非寸關尺之謂也寸失尺之脈乃氣血之先人之神也故可以候周身百骸之疾余之所指非即動脈為診乃宗內經脈經形於上者上診之形於下者下診之乃法象也非為動脈之出入而言也昔秦越人述內經之微旨而取診法於寸關尺者又豈無所本哉寸關尺之部位乃手太陰經經渠太淵穴也實手太陰經之動脈出入之地古人取此以驗五臟之脈者以肺受百脈之朝又五臟六腑之氣味皆出於胃變見於氣口以氣口為五臟主而脈之大要會也按脈要精微論曰尺內兩傍則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也按此附上謂關也上附上謂寸也寸關皆有左右手分診而尺獨不分左右者則兩尺皆以腎為診也明矣內經論診法部位前後上下如此皆法象天地配合陰陽誠萬古不可少易者越人闡明內經之旨取寸關尺以診一身臟腑上下之候而王叔和宗之皆本於此心包絡附近於君當宗脈經心部診之乃上以候上之意也三焦亦當如脈經上中下分診之其腎肝之動脈雖不上行於手而腎肝之元神氣血之先豈有不隨胃之元氣上行耶玉機真臟論曰臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故一難獨取寸口以決五臟六腑死生吉凶之法其義可見是以醫者要明天地陰陽上下之理以譬周身則自然貫通不為異論束縛為醫而不本素難脈經而一聽庸俗口耳之學與為儒而不講明四書五經惟徒剽竊時義者何異孫思邈曰不知易者不足以言太醫斯言誠有味哉十一脈義脈者天地之元氣也人受天地之氣以生故一身之升降浮沉即造化生生不息之機其不息者脈也按內經五常政大論篇岐伯曰根於中者命曰神機神去則機息顧其為字從肉從永其命名為陌謂脈脈不斷長永之道也是斡旋一身而為之綱領彼四時之脈體有如弦鉤毛石之謂者無非迹陰陽浮沉升降消長而取義耳至其運行之妙有起伏隱見可驗於一呼一吸之間仲景曰呼吸者脈之頭也是以有呼吸則有脈無呼吸則脈息氣絶而物化矣此其天人一致之理四時流行之機微妙不易名狀必潛會默契庶可得其真體劉守真釋名為幕余以為未然爾雅謂膜幕也幕絡一體也非謂脈也膜則有形而脈則以神運無形者也觀天何言哉四時行百物生可見矣故見此者謂之知道悟此者謂之知脈脈何容易言哉上釋脈義十二問十二支土多十二經火多之義有以十二支問於生生子曰十二支屬水火木金者各二土屬有四者何也生生子曰萬物生於土而歸於土土本四維寄旺於四季之末故土有四也土也者在人以脾胃應之四肢屬脾四肢猶四維也臟腑皆藉脾胃以為養猶萬物皆藉於土也又問人之十二經金木水土各二而已火獨有四者何也生生子曰有令德之君必有調元贊化之臣然後綱維立教化行而成無為之治假令君非相以贊密勿何能帥百執事恪恭厥職三焦包絡亦猶是也包絡有護持之功三焦有承宣節制之效何以見蓋榮衛出於三焦而所以營於中衛於外大氣搏於胸中以行呼吸使臟腑各司其職而四肢百骸奠安者孰非相火斡旋之功哉古人以藥譬兵以身譬國良以此夫丹溪曰天非此火不能生物人非此火不能以有生信然十三問手心主或有問於生生子曰靈蘭祕典篇問十二經貴賤相使何獨遺手心主也生生子曰無所遺也以膻中該言爾膻中者臣使之官喜樂出焉靈樞脹論篇曰胸腹者臟腑之郭也膻中者心主之宮城也素問遺篇曰膻中在胸兩乳間為氣海手厥陰包絡之所居此作相火位故言臣使主其喜樂十四手足經配合臟腑之義有以十二經問屬手足者何以故生生子曰陰陽上下配合之義也手經之脈起於手足經之脈起於足手經主持於上足經主持於下手足經者所以紀上下也猶易之本乎天者親上本乎地者親下也素問運氣篇曰心肺心包絡皆膈上屬手經肝脾腎在下屬足經手同手經足同足經手足經臟腑陰陽相配皆然乃一合也或曰臟腑既以陰陽配合表裡何無夫妻之義豫曰夫妻配合是以相剋言陰陽此以手足同類言陰陽乃自然之勢不可紊者如手太陰肺金也里也陰也手經也故以手陽明大腸金配手少陰心火也里也陰也手經也故以手太陽小腸火配足太陰脾土也陰也里也足經也故以足陽明胃土配足厥陰肝木也陰也里也足經也故以足少陽膽木配足少陰腎水也陰也里也足經也故以足太陽膀胱水配此五臟五腑五行正配合也手厥陰心包絡火也手少陽三焦亦火也二經雖無特形皆屬相火一為氣父表也一為血母里也亦是以類配也手以手配足以足配陰以陽配火以火配水以水配金以金配木以木配土以土配皆自然之勢不得不然者觀此配合則知上下手足陰陽皆有定偶手配手之陰陽足配足之陰陽則手經之三焦必不配足經之右腎明矣十五問五行金木水火土之義生生子曰夫五行者一水二火三木四金五土咸有所也何以然素問運氣曰水之為言潤也陰氣濡潤任養萬物也火之為言化也陽在上陰在下毀然盛而化生萬物也木之為言觸也陽氣觸動冒地而生地金之為言禁也陰氣始禁止萬物而揪斂土之為言吐也含吐萬物將生者出將死者歸為萬物家水生於一靈樞經曰太一者水之尊號一數之始也天地未分萬物未成之初莫不先見於水先地之母後萬物之源以今驗之則草木子實未就人蟲胎卵胚胎皆水也故天一生水一陽數也子北方水之位也子者陽生之初故水曰一地二生火二陰數也午南方火之位也午者陰生之初故火曰二天三生木三奇之數木居東東亦陽也故木曰三地四生金四偶之數金居西西亦陰也故金曰四天五生土五者奇之數亦陽也土應西南長夏故土曰五以上下左右合而觀之卒莫不有一定之理而人身應之午位居上故火旺於午在人以心應之故心居上子位居下水旺於子在人以腎應之故腎居下卯位居左木旺於卯在人以肝應之故肝居左酉位居右金旺於酉在人以肺應之故肺居右中者土位土居未在人以脾胃應之故脾胃居中此五行不易之定位也觀五行一定之理則火不在下部尤可見矣十六問心包絡何以不得為藏或有曰難經言藏有六心肝脾肺腎五而已餘一藏乃右腎也手厥陰心包絡既是十二經中之一經與少陽為表裡矣乃不以包絡為藏而以右腎當之何也生生子曰心包絡乃包心之脂膜實不離乎心也雖其經起止有二余絡出入屈折相同觀靈樞邪客篇有曰少陰無腧心不病乎岐伯曰外經病而藏不病也蓋心者五臟六腑之大主精神之所舍其藏堅固邪弗能容容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨取其經於掌後鋭骨之端其餘脈出入屈折其行之疾徐皆如手少陰心主之脈行也非若右腎之有形質者比也以其質無特形是故不得為特藏也十七又問右腎既為六臟之一矣何十二經中不以右腎之有形者足其數固乃以手心主當之此其故何哉生生子曰詳乎哉問也難經雖有右腎命門為一臟之説然外無經絡所屬且又云其氣與腎通則亦皆腎而已矣其習坎之謂歟黃庭經曰北方黑色入通於腎開竅於二陰左腎為壬右腎為癸壬癸皆水也內經六節藏象論篇曰腎者主蟄封藏之本精之處也受臟腑之精而藏之也精亦水也因其皆屬水故以足少陰之經統而屬之此二而一一而二者也彼手心主者外有手厥陰之經絡屬於相火隸於手經顧手足經陰陽配合之勢手不與足配火不與水配陰不與陰配是故不得與十二經之數也且火高水下水火不相射也十八問五行土無定體寄旺四季各一十八日何長夏一月土又獨主之生生子曰朱子云天有春夏秋冬地有木火金水人有仁義禮智皆以四者相為用也論歲氣流行之序一歲之中有春夏秋冬四時木火金水各主一時以行其氣雖不言土而土在四季中矣土又獨主長夏一月者蓋長夏建未未位西南乃土正旺之地顧五行之理順而相生無少間斷彼冬之水生春之木春之木生夏之火夏火正熾曷能使其生金徒有傷之而已火旺則土相故以土繼之是火生土而土生秋金秋金生冬水冬水復生春木乃可生生無窮禮運曰播五行於四時周子亦曰五行順布四時行焉是四時之內固備五行之氣也由是而土獨主於長夏也十九問十二經臟腑命名之義生生子曰此聖人觀數於物而名之也按爾雅曰心纖也靈識纖微無物不貫心也卮言曰心者深也為之君主神明出焉深居端拱而相火代之以行事也肺者茷也茷茷然而居乎其上為五臟之華蓋也又云肺勃也言其氣勃鬱也脾者裨也所以為胃行水穀而裨助乎四臟也又脾屬土天高而地下尊卑之義也腎者神也神也者妙萬物而為言者也為作強之官技巧出焉妙萬物者也又腎者引也腎屬水主引水氣灌注諸脈也肝者干也屬木象木枝幹也為將軍之官謀慮出焉所以幹事也胃者匯也萬物之所聚故曰海也腸者暢也實而不滿通暢胃氣去滓穢也膽者敢也為中正之官決斷出焉敢之義也又曰膽者淡也清淨之府無所受輸淡淡然也膀胱者脬之室也室以藏物猶包裹也又曰胞鞄也空虛之言也主以虛承水汋也包絡者以其包絡於心不使濁氣熏蒸於心也又名手心主者以其主行心之事也手是言手經三焦以焦言猶三才也三才之用重於中焦滑伯仁曰三焦始於原氣用於中焦散於膻中上焦主內而不出下焦主出而不內其內其出皆系中焦之腐熟用於中焦之為義其可見矣二十原呼吸生生子曰呼吸者即先天太極之動靜人一身之原氣也即腎間動氣有生之初就有此氣默運於中流動不息然後臟腑得所司而行焉難經曰腎間動氣者五臟六腑之本十二經脈之根呼吸之門經謂肺出氣出此也腎納氣納此也謂呼在肺而吸在腎者蓋肺高腎下猶天地也故滑伯仁曰肺主呼吸天道也此呼吸乃口鼻之呼吸指穀氣而言也腎司闔闢地道也此闔闢乃真息指原氣而言也靈樞曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸行猶承行此指後天穀氣而言謂呼吸資宗氣以行非謂呼吸屬宗氣也何者人一離母腹時便有此呼吸不待於穀氣而後有也雖然原氣使無宗氣積而養之則日餒而瘁呼吸何賴以行故平人絶谷七日而死者以水穀俱盡臟腑無所充養受氣也然必待七日乃死未若呼吸絶而即死之速也以是知呼吸者根於原氣不可須臾離也宗氣如難經一難之義原氣如八難之義原氣言體穀氣言用也上原呼吸二十一論診法生生子曰甚矣脈之難言也非脈之難言也欲盡於寸關尺三部之難也非盡於寸關尺三部之難也欲盡於寸關尺三部而能以意會於臟腑之外之難也蓋脈通於經絡運行於臟腑而充周於郛廓診候者不以意會徒拘拘以一臟一腑而盡於寸關尺三部之中則凡臟腑之外經絡之間腦項胸背腰膝𫏜踝四肢百骸無有不病者又將安診吾謂三部之中非一臟一腑所能盡也彼內經脈要精微論篇但言候五臟與胃余大小腸及膽膀胱不言者非略之也各以部地而該之也何哉如曰尺外以候腎尺裡以候腹中所謂腹中者何物也蓋小腹之下大小腸膀胱所居之地也又如左外以候肝內以候膈膈非腑也獨非一身中物乎膈之下膽所居也五臟之系上下聯絡莫不經循膈過然則候膈者非即膈膜已也又如左外以候心內以候膻中膻中雖非實臟乃心主之宮城與右內以候胸中相同皆即其部地言之也腹中胸膈之候乃內景之事而胸膈腹之外又何以候之故後四句復申言曰前以候前後以候後上竟上者胸喉中事也下竟下者小腹腰股膝脛足中事也觀此則三部中非拘拘一臟一腑所可盡也余故曰欲盡於三部而意會於臟腑之外之難也古人以寸部之陽候頭痛以尺部診大小二便雖云腎主二便其實上以候上下以候下之驗也特附於上以廣三部診外之意云二十二證候推移指法內經脈要精微論篇曰推而外之消息之內而不外有心腹積也推而內之消息之外而不內身有熱也推而上之消息之上而不下腰足清也推而下之消息之下而不上頭項痛也左寸外以候心內以候膻中左關外以候肝內以候膈右寸外以候肺內以候胸中右關外以候胃內以候脾兩尺外以候腎里以候腹中是以有推而內推而外消息之法也一説左寸推而上之上而不下頭項痛推而下之下而不上胸脅痛也推而內之內而不外心腹積也推而外之外而不內眼目昏也左關推而上之上而不下腰足清也推而下之下而不上腸胃痛也推而內之內而不外筋骨痛也推而外之外而不內身有熱也左尺推而上之上而不下小腸痛也推而下之下而不上足脛痛也推而內之內而不外小便濁也推而外之外而不內腰足痛也右寸推而上之上而不下氣喘急也推而下之下而不上胸中痛也推而內之內而不外咽喉痛也推而外之外而不內背脊痛也右關推而上之上而不下吐逆也推而下之下而不上主下血也推而內之內而不外腹有蠱也推而外之外而不內肌肉痛也右尺推而上之上而不下小腹脹也推而下之下而不上足腿痛也推而內之內而不外疝瘕也推而外之外而不內小便祕也汪石山曰按消息謂詳細審察也推謂以指那移於部之上下而診之以脈有長短之類也又以指那移於部之內外而診之以脈有雙弦單絃之類也又以指推開其筋而診之以脈有沉伏止絶之類也刊誤謂內外以指按輕重言推有數義故特著之非但外以候心內以候膻中之類也二十三宗氣營氣衛氣説生生子曰宗氣者為言氣之宗主也此氣搏於胸中混混沌沌人莫得而見其端倪此其體也及其行也肺得之而為呼腎得之而為吸營得之而營於中衛得之而衛於外胸中即膻中膻中之分父母居之氣之海也三焦為氣之父故曰宗氣出於上焦也營氣者為言營運穀氣入於經隧達於臟腑晝夜營周不休始於手太陰而終於手太陰以應刻數焉故曰營出中焦也又曰營是營於中又曰營在脈中世謂營為血者非也營氣化而為血耳中字非中焦之中乃經隧中脈絡中也內經痹論云營者水穀之精氣和調於五臟灑陳於六腑乃能入於脈也衛氣者為言護衛周身溫分肉肥腠理不使外邪侵犯也始於足太陽五十度而終於足太陽故曰衛出下焦也又曰衛是衛於外又曰衛在脈外此外字亦非純言乎表蓋言行乎經隧之外也內經痹論篇云衛氣者水穀之悍氣其氣慓疾滑利不能入於脈也故循皮膚分肉之間熏於肓膜散於胸腹逆其氣則病從其氣則愈生生子曰人與天地生生不息者皆一氣之流行爾是氣也具於身中名曰宗氣又曰大氣經營晝夜無少間斷靈素載之而後人莫之言也後人只知有營衛而不知營衛無宗氣曷能獨循於經隧行呼吸以應息數而溫分肉哉此宗氣者當與營衛並稱以見三焦上中下皆此氣而為之統宗也靈樞經五味篇曰谷始入於胃其精微者先出於胃之兩焦中下焦也以溉五臟別出兩行營衛之道其大氣之搏而不行者積於胸中命曰氣海大氣即宗氣氣海即膻中又邪客篇曰五穀入於胃也其糟粕下焦津液中焦宗氣上焦分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉此出上焦為一隧也營氣者泌其津液注之於脈化以為血以營四末內注五臟六腑以應刻數焉此出中焦為一隧也衛氣者出其悍氣之慓疾而先行四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑此出下焦為一隧也營衛生會篇黃帝曰願聞營衛之所行皆何道從來岐伯曰營出於中焦衛出於下焦衛氣篇曰其浮氣之不循經者為衛氣其精氣之行於經者為營氣講明此三氣者自秦越人而後惟四明馬玄臺難經正義考究極工於宗氣則曰自夫飲食入胃其精微之氣積於胸中謂之宗氣宗氣會於上焦即八會之氣會於膻中也惟此宗氣主呼吸而行脈道於營氣則曰營氣者乃陰精之氣也即宗氣之所統猶太極之分而為陰也此氣行於晝二十五度行於夜二十五度始於手太陰五十度而復會於手太陰而行晝行夜十二經之陰陽皆歷焉所謂太陰主內者此也於衛氣則曰衛氣者陽精之氣也亦宗氣之所統猶太極之分而為陽也晝日行於陽二十五度夜行於陰二十五度始於足太陽五十度而復會於足太陽引靈樞歲露篇曰衛氣一日一夜常大會於風府風府者足太陽督脈陽維之會所謂太陽主外者此也蓋營氣行陽行陰主晝夜言衛氣行陰行陽主陽經陰經言營氣之行於晝者陽經中有陰經行於夜者陰經中有陽經故行陰行陽主晝夜言也衛氣則晝必止行於陽行三陽經也夜必止行於陰行三陰經也是陰陽不指晝夜言也又謂靈樞五十營等篇言氣脈流行自手太陰而始至足厥陰而終循環不已漏水下一百刻計一萬三千五百息脈行八百一十丈推之則二刻行一度為一周身也晝夜共行五十度則每經各行五十次矣並未嘗言肺止行寅時大腸止行卯時又不思各經長短不同難以分時注釋如果十二經分配十二時則一時止行一經何以能八刻之一千八十息脈行六十四丈八尺而四度周於身也又何以能十二時之一萬三千五百息脈行八百一十丈而五十度周於身也所謂一時止行一經者實理勢之所必無也以上考正皆出靈素蓋此公精究經旨融會脈絡王冰以下一人而已非苦心積纍不能也觀第一難一章則可以見其概惜乎獨於三焦惑於陳無擇之言未之加察餘三復之餘微有慨焉然終不以寸朽而棄合抱之材也二十四痢與滯下辨或有問於余曰劉河間云仲景治痢多用承氣但與滯下混同立論而無分別考之諸方亦未見其有分治者抑河間之説不足憑歟余曰前人略之也經雖無明文然顧名思義可知矣書曰夏傷於暑秋多瘧痢痢者利也通利之義乃時症也或從泄瀉而得或徑大便膿血蓋秋令氣降腹中穢積因時下行而痢也彼滯下者滯是積滯之滯不因時令不由泄瀉而竟裡急後重垢膩之物頻並而下也豈可同日語哉故滯下之症始得之多用推陳致新迎而奪之之法至於治痢有用補法者有用澀法者有燥濕者有升提者有消之者有溫之者有分利者有下之者然初時不敢遽以藥下之因時制宜必審其胃實積固乃敢推蕩耳余故云痢者兼令氣而言也滯下者四時皆有之名既別則治法當有徑庭矣或曰唯古謂先水瀉而後膿血者為脾傳腎乃賊邪難愈先膿血而後水瀉者為腎傳脾乃微邪易愈相傳微賊之説是亦以大概言之也究竟其説世亦有先後水瀉膿血而各有難易者愚謂先水瀉而後膿血此脾先虛而積滯繼至故難愈先膿血而後水瀉此積滯既去已無邪矣故易愈高明幸察之二十五噎膈翻胃辨或有問於余曰丹溪局方發揮云翻胃即是噎膈噎膈乃翻胃之漸言此蓋火氣炎上熏蒸津液成痰切切不可用香燥之藥若服之必死又曰年高者不治蓋少年氣血未虛用藥劫去痰火病不復作老年氣血已虛病必不起據曰翻胃即噎膈似是一病又曰噎膈乃翻胃之漸似又是二病至用藥謂服香燥之劑必死乃今時亦有用香燥而得生者何也余曰噎膈翻胃古雖未辨然擬名定義似有不同治法亦將無同也顧局方發揮一書蓋為闢溫補戒燥熱諄諄立言於名義亦未暇辨也愚意謂噎膈翻胃乃是三病亙古至今曾未有人剖析其義者夫飲食入於噎間不能下噎隨即吐出自噎而轉故曰噎膈是膈膜之膈非隔截之謂也飲食下噎至於膈間不能下膈乃徐吐出自膈而轉故曰膈翻胃是飲食已入胃中不能運化而下脘又燥結不通朝食而暮吐暮食而朝吐明其自胃中而倒出故曰翻胃也均一吐病而有上中下之分數千年間惟潔古老人治吐而有上中下之論曰上焦吐者主於氣中焦吐者主於積下焦吐者主於寒故今人亦有用香燥而治愈者實寒氣使然也在人體認真切爾至於年老之人誠難治效丹溪豈欺我哉張雞峰曰膈是神思間病惟內觀自養庶可克濟斯言亦良語也二十六四時脈説或有難豫者曰脈有七表八里九道而無弦鉤毛石書何謂春弦夏鉤秋毛冬石也且其義安在豫曰此陰陽升降之理也三才原一太極春弦者肝之脈也與膽為表裡夫陽氣自地而升此時其氣尚微在半表半裡之間故其氣來軟弱輕虛而滑端直以長故曰弦夏脈鉤者是陽極而陰生也夫鉤本大而末小夏至一陰生夏月六陽之氣盡升其脈來大而去小故曰鉤秋脈毛者此毛字讀作毫字孟子明足以察秋毫之末正是此義明陰氣自天而降輕細以浮故曰毛冬脈石者冬令萬物潛藏之時是陰極而陽生也腎主其令腎屬水主閉藏沉而有力如石之在水中故曰石夫升降浮沉之理變化無窮豈鑿鑿之七表八里九道能悉耶且脾胃平和之脈不大不小不短不長難以明狀惟以意消息之彼二十四歌者正如以管窺天也噫二十七問傷寒桂枝湯用桂枝説或問生生子曰傷寒書桂枝湯後有云脈浮緊發熱汗不出者不可與也與之則表益實而汗益難出耳則是以桂枝為固表藥也何麻黃湯中又用桂枝為臣耶生生子曰考方療疾全在體認氣味衍義謂桂大熱桂味辛甘主溫中利肝肺氣為諸藥先聘通使溫和榮衛宣導百藥無所畏然桂枝湯用桂者以其衛為邪襲則氣不固故汗出惡風桂枝味辛甘陽劑也陽劑其行快入咽則先布散充達百骸四肢無處不至此散之之意也至於止汗自是芍藥芍藥味酸陰劑也陰劑入咽其行遲故先散之而後收之一開一合邪氣散而真氣不過泄以致於適中非謂桂枝能止汗也麻黃湯用桂枝為臣亦以其辛甘發散為陽若謂其實表止汗將安用之蓋以其寒傷榮桂枝能佐麻黃而散寒邪溫和榮衛則邪自不能容留汗出而解也桂枝湯後叮嚀不可與者為內有芍藥寒既傷榮發熱無汗復用酸寒收斂之劑則邪無從而出表乃益實也非謂辛散能實表也風陽氣也陽主散風傷衛則氣散而汗出寒陰氣也寒主斂寒傷榮則氣斂而無汗故治法無汗要有汗取辛散能發汗也有汗要無汗取酸收能止汗也俱用桂枝者以其既能發散而又能溫和榮衛也豫故曰考方療疾全在體認氣味二十八氣鬱脅痛論或問治氣鬱脅痛有謂達之者有謂瀉之者於達瀉二字還有説否生生子曰脅者肝之部分又足少陽經所行之地此經多有餘經曰東方實丹溪曰氣有餘便是火內經曰肝者將軍之官謀慮出焉膽者中正之官決斷出焉蓋人於日用之間不能恬淡虛無而純合乎天和惟不能恬淡虛無而合乎天和是以七情一有不遂則生郁郁久則生火壅遏經隧充塞清道而痛作矣至於痛極而湧吐酸水者猶洪範所謂曲直作酸乃肝膽之咎徵也經曰木鬱則達之啓玄子謂吐之令其條達此固一説也然於達之之義猶有所未盡焉達是通達之達非獨止於吐也木鬱於下以柴胡川芎之類升而發之以順其挺然之性正所謂因曲而為之直又謂從其性而升之皆達之之義也仲景小柴胡湯治少陽脅痛以柴胡為君得其旨矣經曰有餘者瀉之今肝實而脅痛固宜瀉之矣本草列青皮香附黃連白芍柴胡川芎之類均為瀉肝之劑苟不擇而用之吾未見得志也何者夫青皮香附瀉氣之沖逆者也黃連白芍瀉血之沸騰者也經曰上者抑之為其當下而不下故用此辛酸苦寒之劑以泄其沖逆沸騰之勢使之降下以致於平而已此正治法也群皆識其為瀉也至若柴胡川芎之所以為瀉者則異乎是也蓋柴胡川芎升發肝膽之清氣者也經曰下者舉之為其當升而不升故用此辛甘苦平之味於陰中提陽以扶其直遂不屈之性使之上升以復其常是清陽升而濁陰降也正前所謂木鬱則達之之意此從治法也群皆未識其所以為瀉也經曰輕者正治重者從治又曰輕者可降重則從其性而升之又曰過者折之以其畏也所謂瀉之過者謂郁實而為火也折之者為裁之也畏者如木鬱之病用辛散屬金之藥而排闥其紛夥剪伐其猖獗以致於中和乃撥亂反正之意也此皆識陰陽升降之理順逆之勢有如是耳噫苟為醫而不明陰陽升降之理順逆之勢則用藥安能識其正哉且夫人與天地相流通者也即舉肝而言之在天為雷在方為東在時為春在五行為木在人為肝運動之氣皆相參焉故張子和曰膽與三焦尋火治肝與包絡都無異丹溪曰此指龍雷之火而言也在人以肝膽應之凡物不得其平則鳴彼陽氣久伏壅遏於九地之下則品物為之潛藏當其升發之際必轟然迅烈大發聲震驚於天關之外然後品物咸亨此勢也理也今木鬱之病亦近之木鬱於下則春升之令不行以故痛而猛猛而吐吐而愈者亦均此勢也均此理也知夫此則凡造物之所以有升降順逆者皆得以遂其正矣於用藥乎何有二十九論痰為津液脾濕所生亦有因於火因於虛因於氣因於食者而二陳峻利之劑不可以概用也生生子曰痰者津液所生也經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若脾虛停濕則失其健運之常不能致精於肺遂而成痰此脾濕而生痰者也有陰血不足陰火上逆肺受火侮不得清肅下行由是津液凝濁生痰不生血者此又因陰虛火動而成痰者也由是知痰之為物皆脾濕津液所成明矣治痰者要當察其所來之源世俗例以二陳統治諸痰不分寒熱因於濕者固亦宜矣蓋半夏燥脾濕陳皮利肺氣茯苓入手太陰利水下行甘草調和諸性入脾為使三味皆燥濕剛悍之劑使水行氣下濕去土燥痰斯殄矣脾斯健矣使脾無寒濕則何以當之由是知二陳之治痰者非治痰也是治痰之因於濕也至於火刑肺金不得下降而用二陳者此又失之疏也因於火則治火火降金清秋令乃行水無壅遏痰安從生丹溪曰黃芩治熱痰假其下火正謂此也若一例而以二陳治之吾知脾愈燥而火愈動非惟病不能去而反增其喉痛聲啞咳嗽盜汗煩躁口渴也已又有食積痰者飲食過飽則傷脾脾傷則氣餒氣餒則濕停濕停則痰生矣宜以保和丸類治之又有氣鬱生痰者嚴用和云人之氣道貴乎順順則津液流通決無痰飲之患是以治痰必先利氣者謂痰之所從來皆由七情鬱結氣道不清氣積生涎今利其氣使鬱結開而氣道暢抑何痰飲之有宜七氣湯越鞠丸之類治之是也又有風痰者由表虛皮腠不密風邪得以乘之肺氣不利邪郁為熱是以濁涕稠黏治宜散風利氣如杏仁枳殼紫蘇前胡之類是也有驚痰者驚則神不守舍氣亂胸中清濁相干脈道壅塞痰遂生焉故驚痰者多生心痛顛疾以牛黃鎮心丸之類治之是也有冷痰者由脾胃虛弱不能運化精微氣餒行遲津液凝滯所致治宜溫暖脾胃脾充而津液行矣如乾薑白朮之屬是也又有腎虛不能制火津液生痰不能生血者緣肺主出腎主納今腎虛不能納氣歸原出而不納則積積而不散則痰生焉以金匱腎氣丸之類治之是也內有茯苓澤瀉利水下行使濕去而痰絶地黃山萸補實腎水水升則火自降而全收藏之職矣至於中氣不足痰因積聚胃中亦賴所養不可峻用利藥恐胃一傷凶變莫測宜當溫補使脾胃充實痰自流動如六君子之類是也此丹溪所以諄諄戒人峻用利藥之失也若夫流飲支飲伏飲懸飲溢飲積年纍月膠固難治者當視其形氣何如或汗或吐或下或熔隨其所宜劫而去之痰去則當補養務使中氣充實庶無峻利之失矣學者亮之或曰丹溪云實脾土燥脾濕是治痰之本也又曰二陳湯一身之痰都管治痰之要藥也欲上行加引上藥欲下行加引下藥吾子以此言非丹溪語耶余曰此蓋指脾胃濕化之痰也脾胃為水穀之海五臟六腑之所受氣者也人之七情居處不能一一中節稍有悒鬱則氣血凝滯津液不行痰斯生矣故丹溪每以實脾土燥脾濕而言也如痰在脅下非白芥子不能達痰在四肢非竹瀝不行痰在皮裡膜外非薑汁竹瀝不除氣虛之人有痰非竹瀝不開又曰痰結核在咽喉燥不得出以化痰藥加咸能軟堅之味栝蔞仁杏仁海石桔梗連翹少佐以朴硝以薑汁蜜丸噙化又曰天花粉大能降上膈熱痰海粉熱痰能降濕痰能燥結痰能軟頑痰能消枳實治痰能沖牆壁人中黃能降陰火而清食積之痰又曰痰因火盛逆上治火為先白朮黃芩石膏之類久病陰火上升津液生痰不生血宜補血制相火其痰自除丹溪未嘗純倚二陳為用矣以上述治痰之藥亦不為不多矣丹溪何嘗固執於此蓋以意立法耳醫者貴乎貫通達變則得之否則何以異於刻舟求劍也三十咳嗽生生子曰古云咳者謂無痰而有聲肺氣傷而不清也嗽者謂有痰而無聲脾濕動而生痰也今曰咳嗽者既有聲而復有痰也然其病不一有五臟咳有六腑咳有六氣咳有虛咳有實咳有水咳有火咳種種不同用藥亦異觀古人立方多所重於肺部有清肺者有保肺者有斂肺者有瀉肺者有補肺者五者謂肺屬金而主乎聲者也惟肺也外統皮毛為一身之護衛內為華蓋作五臟之至尊肺受百脈之朝故病每干於肺設不幹肺抑何咳焉是以治咳必兼於肺至於清痰降火流濕潤燥補腎疏風者莫明於丹溪纂要條分列治極為詳盡但主嗽多咳少耳學者宜於是而擴充之則思過半矣三十一哮生生子曰丹溪云哮者專主於痰宜用吐法亦有虛而不可吐者必使薄滋味不可純用寒涼必兼散表此深造病情者也其間亦有自童幼時被酸鹹之味或傷脾或搶肺以致痰積氣道積久生熱妨礙升降而成哮症一遇風寒即發緣肺合皮毛風寒外束弗得發越內熱壅鬱新痰復生因新痰而致舊痰並作也是以氣高而哮抬肩拮項不得仰臥面赤頭疼惡寒發熱治宜散表表散熱解氣道流通庶亦暫可有飲食厚味傷脾不能運化而發者脾傷則津液不得布散而生痰涎壅塞經隧肺氣為之不利則胸滿腹痛盜汗潮熱晝夜發哮聲如拽鋸治宜消食健脾清痰利氣斯亦定矣有房勞太過腎水衰少不能制火下降火寡於畏而侮所勝肺金受傷金傷則生化之源絶矣病則下午潮熱哮聲如雷頭疼面赤盜汗煩躁晝輕夜重脈數無力治當補腎制火清金潤燥庶或得安有氣逆而發者經曰怒則氣上有升無降又曰大怒則火起於肝又曰上升之氣自肝而出中挾相火肺虛不能平木病則胸滿脅痛耳聾眼赤氣出如火治宜抑肝利氣是痰也氣厚者當劫而吐之拔其病根根拔又當速補中氣中氣充實痰不再作矣三十二喘生生子曰內經云諸氣憤郁皆屬於肺諸滿喘嘔亦屬於肺以肺主氣者也諸喘氣逆者乃陽火急數而然也一呼一吸為一息呼隨陽出吸隨陰入呼吸之間脾受其氣通乎營衛合乎陰陽熱則息急氣粗寒則息遲氣微今之喘逆由火熱而息急也或六淫所傷七情所感或脾腎俱虛或脾濕腫滿或本臟氣虛或瘀血傷滯皆所以致之要當合脈認病合病制方庶無差失之患矣又曰方書有云治喘嗽者有云治痰喘者有云治喘逆氣急者有云氣喘者不可不分別明白究治此病虛實攸系匪輕驗今之喘嗽者既嗽而兼有喘聲也痰喘者喉中有痰或出或不能出抬肩擷項者是也喘逆氣急者無痰嗽而獨氣急作喘聲也氣喘者較逆急勢則稍緩耳前二者兼痰兼嗽蓋有雜症以干之故治有汗吐下之不同也後二者乃本臟氣虛或陰虛火動及産後喘急者為孤陽幾於飛越治惟補之斂之攻補之不同由虛實之異路也少有差忒則輕者重重者死矣豫於喘嗽二病尋究端倪會類治法逐證填方不以重復自嫌其間搜集不盡者將俟後之明敏藉此為左券云爾喘而無汗者宜解表喘而有汗者宜和營衛固腠理腹滿脈沉實者為內實當下之發時有痰吐出者宜化痰發時有痰不能出者宜開提之食積痰逆者宜導痰運脾飲水多者宜滲利之久嗽不已痰壅胸膈氣實者宜吐之心火形肺者宜清心熱氣從小腹上衝乃衝脈之火宜調中益氣湯加黃柏知母以降之脈數無力者宜滋陰降火産後喘急者郭氏謂孤陽絶陰極為難治本臟氣虛及久喘攻擊太過者宜人參五味阿膠之類補之新喘氣實者宜葶藶枳殼桑皮之類瀉之腫滿脾虛不能攝水上迫於肺喉中作水雞聲者或小青龍湯或導水丸桑皮赤小豆瞿麥之類決之瘀血凝滯胸膈者或韭汁之類以活之三十三論汗不可純作血看當以氣看為妥生生子曰靈樞經云汗者心之液又曰奪汗者無血奪血者無汗故今人多認汗為心血也愚謂五臟皆有汗不獨心有之也經脈別論篇曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾夫汗不過一氣而已此氣者乃五穀之精氣靜則化而為血以養生身靈樞經曰血者神氣也血之與氣異名而同類焉擾則越而為汗不待化而氣先發越也易曰地氣上而為云天氣下而為雨陰陽應象大論篇曰陽之汗以天地之雨名之良以此也啓玄子注曰夫人汗泄於皮腠者是陽氣之發泄爾然其取類於天地之間則云騰雨降而相似也三十四論五郁生生子曰內經有五郁之論謂木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之雖統揭夫郁之名而未顯言夫郁之症與詳明其達發奪泄折之義惟是後之人認達為吐認發為發汗以泄為解表利小便以奪為下以折為抑其沖逆意義未必非是恐於經義未之盡也余故縷析五郁之症並治法焉夫五臟一有不平則鬱達是條達或通達也發是發越泄是疏泄奪是攘奪折是決折何者夫內經曰木鬱達之木鬱者肝鬱也達者條達通達之謂也木性上升怫逆不遂則鬱故凡脅痛耳鳴眩運暴僕目不認人皆木鬱症也當條而達之以暢其挺然不屈之常如食塞胸中而肝膽之氣不升故胸腹大痛宣而吐之以舒其木之氣是在上者因而越之也木鬱於下脅疼日久輕則以柴胡川芎之類開而提之亦條達之意也重則用當歸龍薈丸摧而伐之孰非通達之意歟火鬱發之火鬱者心郁也發者發越之謂也火性炎上怫逆不遂則鬱故凡瞀悶目赤少氣瘡瘍口渴溲黃卒暴僵仆嘔噦吐酸瘛瘲狂亂皆火鬱症也當發而越之以返其自然之常又如五心煩熱肌膚大熱過食冷物抑遏陽氣於脾土之中以火鬱湯升陽散火湯皆發之之意也又謂從其性而揚之思想無窮所願不遂悒鬱不樂因生痰涎不進飲食或氣不升降如醉如癡以木香石菖蒲生薑雄黃之類帥而動之亦發之之意也小便渾濁瘡瘍舌疳以黃連解毒湯導赤散八正散之類引而下之孰非越之之意歟土鬱奪之土鬱者脾郁也奪者攘奪之謂也土性貴燥惟燥乃能運化精微而致各臟也壅滯漬濡則鬱故凡腫滿痞塞胕腫大小便不利腹疼䐜脹皆土鬱症也當攘而奪之以復其健運之常又如腹中窒塞大滿大實以枳實導滯丸木香檳榔丸承氣湯下而奪之是中滿者瀉之於內也飲食傷脾痞悶痰涎日生以橘半枳朮丸憂思痞結不思飲食腹皮微急以木香化滯湯消痞丸消而磨之亦攘之之意也諸濕腫滿胕腫濕熱發黃以實脾利水之劑燥之孰非攘而奪之之意歟金鬱泄之金鬱者肺郁也泄者疏泄之謂也金貴空清壅塞窒密則鬱故凡咳逆喉疼聲啞胸滿喘息抬肩擷項肌熱鼻塞嘔膿皆金鬱症也當疏而泄之以肅其清降之常又如傷風咳嗽鼻塞以參蘇飲人參敗毒散皆疏之之意胸膈停飲或水飲入肺喉中如水雞之聲或肺癰嘔膿血以葶藶大棗瀉肺湯治之孰非泄之之意歟水鬱折之水鬱者腎郁也折者決折之謂也水貴沉靜搏激窒塞則鬱故凡冷唾上湧水腫腹脹腰膝不利屈伸不便皆水鬱症也決而折之以導其東歸之常又如腎氣抑鬱邪水泛上而冷唾以茯苓澤瀉之類導而下之決之之意也腰臍疼痛不可俯仰或如奔豚之狀以桂心之類折之或小便癃疼久亢不泄而為白濁以小茴香澤瀉黃柏之類治之孰非決之之意歟是皆因其曲而直之也舉其概則余可推矣若以達為吐以發為汗以泄為解表利小便以奪為下以折為抑其沖逆然固然於經義恐猶未盡善也且後文又曰然調其氣過者折之以其畏也所謂瀉之愚謂過者淫勝之謂也折之者謂裁之也如木勝助之以辛火勝助之以咸之類投其畏而伐之故曰五臟一有不平所勝平之遞相濟養交互克伐此之謂也三十五論嘔血生生子曰經云怒則傷肝甚則嘔血並飧泄又曰心主血肝藏血脾統血怒氣上逆則脾氣受傷所藏所統之血皆妄行而錯亂也古方有用芎附飲治之而效者良由川芎香附能調肝氣氣和而血歸經也丹溪有用桂五錢為末冷水調服者緣桂能和榮衛通血脈木得桂而枯且又為從治之法故不獨恃寒涼為治也必須參之脈證如脈微弱虛軟精神疲憊急當獨參湯進之如脈洪大弦長有力精神不倦或覺胸中氣塞或血是紫黑塊者當以承氣湯下之此釜底抽薪法也若勢緩而色鮮紅宜以葛可久十灰散阿膠血餘灰之類止之或調氣或下或止全在臨症活法勿得執一以戕生也滑伯仁曰血溢血泄諸蓄妄證其治也豫率以桃仁大黃行血破瘀之劑以折其鋭而後區別治之或問失血復下虛何以當行血破瘀之劑豫曰血既妄行迷失其道不去蓄利則以妄為常曷以御之且去者自去生者自生何虛之有且如婦人行經有五六日不止者有十數日不止者可見去者自去生者自生也乳婦亦然生生子曰時師治血愛用寒涼每每畏用溫補二法亦偏見也夫有寒當溫有虛當補聖哲不能廢其規但要體認切當毋輕舉也假使胃寒或久為寒涼所激以至血不歸經不溫可乎暴吐暴衄昏運軟倒不補可乎故王海藏治飲冷傷脾吐血以理中湯理治中脘分利陰陽此亦理治內衄之法也三因方曰理中湯能止傷胃吐血以其功最理中脘分利陰陽安定血脈葛可久治吐血昏運用獨參湯仲景曰血脫益氣東垣曰陽生陰長皆有旨趣實法在當用而用也設若陰虛火動咳嗽已久肺有伏火痰帶血絲或紫色血屑又當滋陰潤肺開鬱清痰而前劑未敢以輕試也是知咳血嗽血痰帶血絲惟當滋陰潤肺為先暴吐昏運卻宜補虛溫脾為最全在體察病源勿致偏癖斯為良師滑伯仁曰諸見血非寒證皆以為血熱所迫遂至妄行熱皆復有所挾也或挾風或挾濕或挾氣又有因藥石而發者其本皆然上中下治各有所宜在上則梔子黃芩黃連芍藥犀角蒲黃而濟以生地牡丹皮之類胃血古人有胃風湯正是以陽明火邪為風所扇而血為之動中間有桂取其能伐木也若蒼朮地榆白芍藥之類而濟以火劑大腸血以手陽明火邪為風為濕也治以火劑風劑風能勝濕也如黃連芩芍藥柏皮荊芥防風羌活之類兼用雞冠花則述類之義也又曰驚而動血者屬心怒而動血者屬肝憂而動血者屬肺思而動血者屬脾勞而動血者屬腎三十六論咳血生生子曰咳血多是火鬱肺中治宜清肺降火開鬱消痰咳止而血亦止也不可純用血藥使氣滯痰塞而鬱不開咳既不止血安止哉設下午身熱而脈細數此真陰不足當清上補下三十七論齒衄生生子曰有侄女十歲因毀齒動搖以苧麻摘之血因出不止以小瓦盆盛之一日夜積十一盆用末藥止其處少頃復從口中吐出身亦不倦亦事之希覯也可見人身之血不可測量診其脈皆洪大有力以三制將軍末子二錢用枳殼湯少加童便調下是夜之半去黑糞數塊其血頓止再不復發後又見一男子每齒根出血盈盆一月一發百藥不效歷十餘月每發則昏昧知其人好飲投前劑一服而安又一老嫗患此一發五七日一日約有升余投前劑亦安所下皆有黑糞是知此疾多陽明熱盛所至者緣沖任二脈皆附陽明陽明者多氣多血之經也故一發如潮湧急則治其標故投以釜底抽薪之法應手而愈要知腎虛血出者其血必點滴而出齒或攸攸而疼必不如此之暴且甚有餘不足最要詳認三十八顫振有謂作諸禁鼓栗者非也諸禁鼓栗乃鬥牙戰搖似寒而實熱也夫顫振乃兼木氣而言惟手足肘前戰動外無凜栗之狀生生子曰顫振者人病手足搖動如抖擻之狀筋脈約束不住而莫能任持風之象也內經云諸風掉眩皆屬肝木木主風風為陽氣陽主動此木氣太過而克脾土脾主四肢四肢者諸陽之末木氣鼓之故動經謂風淫末疾者此也亦有頭動而手足不動者蓋頭乃諸陽之首木氣上衝故頭獨動而手足不動散於四末則手足動而頭不動也皆木氣太過而兼火之化也木之畏在金金者土之子土為木克何暇生金素問曰肝一陽也心二陽也腎孤臟也一水不能勝二火由是木挾火勢而寡於畏反侮所不勝直犯無憚難經謂木橫乘金者是也此病壯年鮮有中年以後乃有之老年尤多夫老年陰血不足少水不能滅盛火極為難治前哲略不及之惟張戴人治新寨馬叟作木火兼痰而治得效遇此症者當參酌厥旨而運其精思云三十九相火篇附相火辨生生子曰內經氣交變大論篇云南方生熱熱生火其令熱其變消爍其災燔焫運氣五行生死順逆篇曰火主於南應夏火之為言化也言能化生萬物也六氣之中君火為二之氣經以熱稱之相火為三之氣經以暑稱之暑之與熱皆火令也六化篇曰在地成形在天為氣行有五而氣有六以分君火相火之化六氣化者謂寒暑燥濕風火也乃天之元氣六氣皆有一化舉大概也君火之化熱主春末夏初行暄淑之令而不行炎暑應君之德也相火之化暑主於夏夏之為言大也與午同意炎暑乃行人有觸其氣者皆令氣之病也當從四時令氣之治非病機中五臟厥陽之火同治也五臟厥陽之火所致之疾當從病機之治蓋令氣之火自外而治者病機之火自內而生者內外致疾之原不同則治法當合求其所屬矣病機出至真要大論篇附丹溪相火篇辨生生子曰火為五行之二化生之機在天在人不可一日而無諸書雖往往於雜症中言之然未有能分君相之名及明令氣之序是以多認陰火為相火又有以五志之火為相火即明達精詣如丹溪而格致餘論相火篇亦以龍雷之火為相火又分君火為人火相火為天火愚甚惑焉嘗按內經陰陽應象大論篇有壯火氣衰少火氣壯之言天元紀大論篇有君火以名相火以位之言並無天火人火龍雷火之説至丹溪而始言之何哉愚度丹溪之意既謂肝腎之陰悉具相火是以指肝腎之陰火為相火又曰見於天者出於龍雷則木之氣出於海則水之氣或以龍雷皆動物凡動皆屬火故以相火為天火耶假若以動皆屬火而遂以相火為天火然則君火亦有動之時也獨不可屬之天哉愚謂火為造化生息之機不能不動第不可以妄動火有天人之分不可以君相分屬天人何言之蓋天有六氣君火主二之氣相火主三之氣是君相皆可以天火稱也人有十二經十二經中心為君火包絡三焦為相火是君相皆可以人火稱也故以天之六氣言則二之氣三之氣歲歲若是為亙古不易之常運以人身言則心為君火包絡三焦為相火亦亙古不易之定論君火相火皆有定體以裨助生生不息之功不可一日而無故曰天非此火不能生物人非此火不能有生若彼肝腎雖皆有火乃五志之淫火而非五行之正火致人疾而為元氣之賊不可一日而有也今丹溪不以六氣之火為天火而以肝腎陰火為龍雷之火為天火不以七情所感之火為人火而以君火為人火夫肝藏血腎藏精彼謂悉具相火愚不知其何所見也且經以君火主春末夏初二之氣以熱稱之丹溪乃謂經以暑與濕言之夫暑屬三之氣濕屬四之氣各有主之者與君火何預經以相火主三之氣以暑稱之丹溪乃言經以火稱之謂其暴悍酷烈於君火指為元氣之賊大與經旨相抵牾所以然者良由認相火未真故其立言支離多病前後自相矛盾至於君火以名相火以位之言亦不能暢條其義夫君火以名者蓋以君雖屬火然至尊無為惟正火之名故曰君火以名相火以位者蓋相宣行火令而守位稟命故曰相火以位猶之宰相奉行君令為職位所宜然也彼於相之名義未明是以相火之論未當也愚始閲此篇疑非丹溪之筆已而詳玩筆勢與其他撰著相類或出於一時之意見未遑稽考不然登梓時亦未暇校正竄易耶釋今不為辨校則後之學者不知從丹溪之長徒執迷其陰火為相火之説卒之認相火為賊火不知以五志之火為賊火其誤人也甚矣溯丹溪初心本欲開後之聾瞽不知此論使聾瞽者益聾瞽也愚故願為丹溪之忠臣不憚辨駁者正欲成丹溪惠後之心又何暇計僭逾之罪哉同志者幸亮之四十泄瀉辨生生子曰按泄瀉二字取義必有輕重非一症而無分別者也何也據書有云泄者有云瀉者有云泄瀉者假使無分別經何分言之若是愚謂糞出少而勢緩者為泄若漏泄之謂也糞大出而勢直下不阻者為瀉傾瀉之謂也姑參出以俟明哲正焉四十一防暑論生生子曰欲防夏之傷暑者在於冬之藏精也暑者火令也人與天地同一橐籥故天地之氣有升降人之氣亦隨之夏月六陽之氣盡出於地人之腹亦地也氣浮於外腹中虛矣虛而勞動不常則病生焉況人不善攝生者多於冬月陽氣潛藏之時斫喪過甚精氣虛竭精氣者天真本然之氣也積此為來春發生之本本一虛竭則生元絶矣經曰冬不藏精者春必病溫夏必煎厥人有春末夏初患頭痛體熱食少自汗怠惰嗜臥者此注夏病也仲景謂春夏劇秋冬瘥者是也暑為盛夏火令之極陽氣既浮陰血又竭幾何不病苟或攝養不當動勞失矩氣血復耗神將何依於是卒暴僵仆迷悶霍亂之症迭出不已孫真人教人以五月常服生脈散蓋謂脈者氣血之先氣血者人之神也火令熱傷元氣以人參能補天真之元氣也五味收斂浮散之氣不使飛越又能滋肺補腎庶免二臟真陰枯竭以門冬復脈通心生津潤燥三味和協同為補劑名曰生脈散是亦救其冬不藏精之失也雖然施於體厚未病之先力則易為若稟弱既病者抑亦難矣故善防暑月之病者不若保腎水於冬月未病之先也東垣論暑兼脾胃虛弱而言甚為詳悉丹溪載夏月伏陰在內戒用燥熱玉機微義與載籍間所載暑病尤班班焉皆當細玩學者能潛心貫而通之無餘蘊矣四十二痿論生生子曰世之病痿者甚多而治痿之法甚少考之內經且特立篇目非泛常總括病機者倫也治法之少由後人或未能盡悉經旨今按內經皆以氣熱為五痿受病之胎則可見痿之病本皆自氣熱中來也何者痿躄之始五臟因肺熱葉焦遞相傳染緣肺者統諸氣心之蓋臟之長君之相傅而治節之所由系焉五痿之疾殆肺之一氣流傳猶宰相承一旨以令天下也觀其獨取陽明為治不以五痿異者此又可見以肺熱為本而五痿為標故治獨取陽明是謂定於一也此取字有教人補之之意非所謂攻取也蓋陽明乃五臟六腑之海主潤宗筋又衝脈者經脈之海與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈陽明虛則宗筋縱帶脈不引故足痿不用茲補其陽明使穀氣充衝脈盛帶脈引宗筋潤是以能束骨而利機關故其治獨取陽明而不以五痿異也既得以熱字為本陽明為用臨症處方則在人自擴充之書曷能盡所言哉丹溪曰內經痿論肺熱葉焦五臟因而受之發為痿躄又曰諸痿皆屬於上指病之本在肺也或曰內經治痿之法獨取陽明何也曰諸痿生於肺熱只此一句便見治法大意經曰東方實西方虛瀉南方補北方此固是就生克言補瀉而大經大法不外於此五行之中惟火有二腎雖有兩水惟其一陽常有餘陰常不足故經曰一水不能勝二火理之必然金體燥而居上主氣畏火者也土性濕而居中主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受邪熱則金失所養木寡於畏而侮所勝土得木邪而傷矣肺熱則不能營攝一身脾傷則四肢不能為用而諸痿之病作瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此駱龍吉亦曰風火相熾當滋腎水東垣先生取黃柏為君黃耆等藥為輔佐而無一定之方有兼痰積者有濕多者有熱多者有濕熱相半者有挾寒者臨病制方其善於治痿乎雖然藥中肯綮矣若將理失宜聖醫不治也但是患痿之人若不淡薄滋味吾知其必不能安全也生生子曰劉宗厚謂治痿方多缺略者皆因混入中風條內故也此皆承丹溪治痿不得作風治斯言深得病旨風乃外入者故當逐散痿則內藏不足所致治惟有補而已但丹溪痿篇中既以內經治痿獨取陽明之説設為或問矣乃不答所以取陽明之旨而以難經瀉南補北之法摘為治痿之方斯亦法外變通之意第不思所問取陽明之義竟何所發明是欲彰之而覆蔽之也胡不曰陽明者胃也坤土也萬物之所以資生焉為脾之表脾胃一虛肺氣先絶肺虛則不能宣通臟腑節制經絡必胃厚則脾充脾充則能布散津液使臟腑各有所稟受四肢健運如是則何有於葉焦何有於痿躄也要知痿之終始只在肺胃之間而已矣肺熱葉焦則不能節制諸經胃氣虛弱則臟腑無所受氣帶脈不引宗筋枯稿而痿躄之所由兆故內經治痿所以獨取乎陽明也以陽明為五臟六腑之海也獨之一字是謂足可以盡其治之辭彼丹溪瀉南補北之法或可以施肺腎之痿其於肉痿敢試之乎經曰肌肉濡漬痹而不仁發為肉痿啓玄子注曰肉屬於脾脾惡濕濕著肌肉則衛氣不營故發為肉痿也據此則瀉火補水之法可得以概治肉痿乎否也丹溪天資甚高筆力尤健凡天資高者或一時之興隨筆成文或自執己見以為是不復更檢觀篇後盛讚東垣治痿之善即可以見其天分惜乎不以東垣之善返照未免自是之為纍歟四十三癲狂癇辨生生子曰諸書有言癲狂者有言癲癇者有言風癇者有言風癲者有言驚癇者有分癲癇為二門者略無定論究其獨言癲者祖內經也言癲癇言癲狂者祖靈樞也要之癲癇狂大相徑庭非名殊而實一之謂也靈樞雖編癲狂為一門而形症兩具取治異途較之於癇又不相侔矣諸書有云大人為癲小兒為癇此又大不然也素問謂癲為胎病自母腹中受驚所致今乃曰小兒無癲可乎癇病大人歷歷有之婦人尤多豫故據經文分為三目庶治者有所辨別云明癲症夫癲者或狂或愚或歌或笑或悲或泣如醉如癡言語有頭無尾穢潔不知積年纍月不愈俗名曰心風此志願高大而不遂所欲者多有之明狂症夫狂者猖狂之謂也言其病之發猖獗剛暴有如傷寒論陽明大實發狂罵詈不避親疏甚則登高而歌棄衣而走逾牆上屋持刀執棍日夜不止狎之則笑忤之則怒如有邪依附者是也明癇症夫癇時發時止者是也有連日發者有一日三五發者或因驚或因怒而動其痰火發則昏昧不知人事耳無所聞目無所見眩仆倒地不省高下甚而瘛瘲抽掣目作上視或口眼歪斜或口作六畜之聲將醒時必吐涎沫彼癲狂皆無以上證也用此辨之亦易詳明大抵皆痰火所致四十四鼻鼽生生子曰按鼻鼽一症今人患者甚多考諸古方鮮有言其病因者惟運氣曰火攻肺虛鼻鼽少陰司天熱氣下臨肺氣上從鼽衄鼻窒又云少陰司天熱淫所勝民病鼽衄嚏嘔又云少陽司天火淫所勝甚則鼽衄又歲金不及炎火乃行民病鼽嚏又曰陽明所至為鼽嚏據運氣皆以火熱司令為言火剋金熱傷肺蓋以鼻為肺之竅也雖云少陰少陽熱火司令之年為病然亦只是腸胃素有痰火積熱者乃有此感也不然火熱主令之歲三年之內曷常無之未嘗人人有此病也吾故曰必腸胃素有痰火積熱者然後有此感也何者大腸肺之府也胃五臟之所受氣者也內經曰九竅不利腸胃之所生也鼻主無形者經曰清氣通於天又曰鼻主天氣愚謂腸胃設無痰火積熱則其平常上升之氣皆清氣也縱火令之年何豫耶若夫腸胃素有痰火積熱則其平常上升之氣皆氳而為濁耳金職司降喜清而惡濁今受濁氣熏蒸凝聚既久壅遏鬱結而為痰涕至於痔珠瘜肉之類皆由積久燥火內燔風寒外束隧道壅塞氣血升降被其妨礙澆培彌厚猶積土而成阜也據運氣云云純以火熱司令之歲火氣下臨肺氣上從乃成鼻鼽嚏衄之症假令水濕司令之歲必無鼻鼽嚏衄而鼻鼽嚏衄之證必待火熱司天之歲而能成耶噫如斯而談則鑿矣觀仲景傷寒論太陽症當與麻黃湯不與者必成鼻衄又見今人每每感風寒隨時鼻塞濁涕及素有鬱熱者微觸風寒即鼻塞嚏涕或調理失宜積年纍月竟成鼻鼽鼻淵者往往有之內經曰膽移熱於腦則辛頞鼻淵又曷嘗必待火熱司令而後始致此病耶愚故曰必腸胃素有痰火積熱又值火熱當權之年內外之火夾攻於此時有甚耳或曰子以運氣之言為不足徵歟何今之按天時占歲候與夫驗豐旱及諸星卜家動輒取應吾恐後之吹毛者將藉此以非子矣子曷逃乎豫曰愚亦深知僭逾為非而無所逃也愚又奚敢謂運氣為不足徵也夫運氣云者指歲運火令當權所不勝者受邪是大略以理該之也否則咳嗽吐血肺癰等症又何莫而非火剋金之候耶愚之所謂腸胃痰火積熱者即病因也於運氣有所核而無相悖戾焉知我者其鑑諸四十五鼻淵俗名腦漏生生子曰按書云鼻流清涕者為鼻鼽流濁涕者為鼻淵內經氣厥論篇曰膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄蔑瞑目故得之氣厥也啓玄子注曰厥者逆也腦液下滲則為濁涕涕下不止如彼水泉故曰鼻淵也足太陽脈起於目內眥上額交巔上入絡腦足陽明脈起於鼻交頞中傍約太陽之脈今腦熱則足太陽逆與陽明之脈俱盛薄於頞中故鼻頞辛也辛謂痠痛豫嘗以防風通聖散除硝黃其滑石石膏減半倍加辛夷花先服三五帖再用此為丸每服七十丸早晚白湯吞服半斤則瘳矣
